name: JavaScript CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'components/**'
      - 'webapp/**'
      - 'examples/**'
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
      - 'eslint.config.mjs'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'components/**'
      - 'webapp/**'
      - 'examples/**'
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
      - 'eslint.config.mjs'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build all (packages → components → webapp → examples)
        run: yarn build:prod

      - name: Type check (tsc --build)
        run: yarn typecheck

      - name: Lint (ESLint strict-type-checked)
        run: yarn lint

      - name: Run unit tests
        run: |
          yarn workspace @casehubio/pages-viz run test
          yarn workspace @casehubio/pages-data run test
          yarn workspace @casehubio/pages-component run test
          yarn workspace @casehubio/pages-ui run test

      - name: Run pages-runtime tests (sharded — vitest #9425 DOM memory leak)
        run: |
          yarn workspace @casehubio/pages-runtime run test -- --shard=1/3
          yarn workspace @casehubio/pages-runtime run test -- --shard=2/3
          yarn workspace @casehubio/pages-runtime run test -- --shard=3/3
