name: Publish Packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/*/package.json'
      - 'packages/*/src/**'
      - 'components/*/package.json'
      - 'components/*/src/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@casehubio'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build all packages
        run: yarn build

      - name: Publish packages
        run: |
          set -e
          for dir in packages/*/  components/*/; do
            if [ ! -f "$dir/package.json" ]; then continue; fi

            PRIVATE=$(node -p "try{require('./$dir/package.json').private||false}catch{false}")
            if [ "$PRIVATE" = "true" ]; then
              echo "⏭ Skip (private): $dir"
              continue
            fi

            NAME=$(node -p "require('./$dir/package.json').name")
            VERSION=$(node -p "require('./$dir/package.json').version")

            # Check if version already exists
            if npm view "$NAME@$VERSION" version 2>/dev/null; then
              echo "⏭ Skip (exists): $NAME@$VERSION"
            else
              echo "📦 Publishing: $NAME@$VERSION"
              cd "$dir"
              yarn npm publish --access public
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify all org packages are public
        run: |
          PRIVATE=$(gh api "/orgs/casehubio/packages?package_type=npm" --paginate --jq '[.[] | select(.visibility == "private") | .name] | join(", ")')
          if [ -n "$PRIVATE" ]; then
            echo "::error::Private packages detected: $PRIVATE"
            echo "All @casehubio packages must be public for fork PRs to build."
            echo "Fix: change --access restricted to --access public in publish workflow."
            exit 1
          fi
          echo "✅ All org packages are public"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
