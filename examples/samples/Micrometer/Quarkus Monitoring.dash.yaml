properties:
  refreshInterval: 10
  metricsUrl: /data/quarkus/metrics
  historyUrl: /data/quarkus/history.json
global:
  mode: dark
  displayer:
    chart:
      resizable: true
      height: 350
      grid:
        x: false
    columns:
      - id: Total
        pattern: "#"
      - id: Value
        pattern: "#"

datasets:
  - uuid: all_metrics
    url: ${metricsUrl}
    cacheEnabled: true
    refreshTime: 5second
  - uuid: live_metrics
    url: ${metricsUrl}
    accumulate: true
    cacheMaxRows: 10000
    refreshTime: 3second
    expression: >-
      $map($, function($v){
          [$v[0], $v[1], $v[2] = 'NaN' ? -1 : $v[2], $now() ~> $toMillis()]
      })
    columns:
      - id: metric
        type: LABEL
      - id: labels
        type: LABEL
      - id: value
        type: NUMBER
      - id: timestamp
        type: NUMBER
  - uuid: history
    url: ${historyUrl}
    columns:
      - id: metric
        type: LABEL
      - id: labels
        type: LABEL
      - id: value
        type: NUMBER
      - id: timestamp
        type: NUMBER

pages:
  - name: index
    components:
      - type: SIDEBAR
        properties:
          navGroupId: QuarkusNav

  # === Page 1: Current Status ===
  - name: Current Status
    rows:
      - columns:
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: "CPU Usage"
                  columns:
                    - id: CPU
                      expression: value * 100
                      pattern: "#"
                  lookup:
                    uuid: all_metrics
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - "system_cpu_usage"
                    group:
                      - functions:
                          - source: Value
                            function: MAX
                            column: CPU
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Open Files
                  lookup:
                    uuid: all_metrics
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - "process_files_open_files"
                    group:
                      - functions:
                          - source: Value
                            function: MAX
                            column: Total
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    visible: true
                    title: "Uptime"
                  columns:
                    - id: UPTIME
                      pattern: "#"
                      expression: value / 60
                  lookup:
                    uuid: all_metrics
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - "process_uptime_seconds"
                    group:
                      - functions:
                          - source: Value
                            function: MAX
                            column: UPTIME
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: "Peak Threads"
                  lookup:
                    uuid: all_metrics
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - "jvm_threads_peak_threads"
                    group:
                      - functions:
                          - source: Value
      - properties:
            margin-top: 50px
        columns:
          - span: 6
            components:
              - displayer:
                  type: BARCHART
                  extraConfiguration: >-
                    {
                      "color" : ["#5ec962"]
                    }
                  general:
                    title: JVM Memory Used Bytes (heap)
                  columns:
                    - id: Labels
                      expression: value.replace("heap, ", "");
                  lookup:
                    uuid: all_metrics
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - "jvm_memory_used_bytes"
                      - column: labels
                        function: LIKE_TO
                        args:
                          - 'heap%'
                    sort:
                      - column: Total
                        sortOrder: DESCENDING
                    group:
                      - columnGroup:
                          source: Labels
                        functions:
                          - source: Labels
                          - source: Value
                            function: MAX
                            column: Total
          - span: 6
            components:
              - displayer:
                  type: BARCHART
                  extraConfiguration: >-
                    {
                      "color" : ["#5ec962"]
                    }
                  general:
                    title: JVM Memory Used Bytes (nonheap)
                  columns:
                    - id: Labels
                      expression: value.replace("nonheap, ", "");
                  lookup:
                    uuid: all_metrics
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - "jvm_memory_used_bytes"
                      - column: labels
                        function: LIKE_TO
                        args:
                          - 'nonheap%'
                    sort:
                      - column: Total
                        sortOrder: DESCENDING
                    group:
                      - columnGroup:
                          source: Labels
                        functions:
                          - source: Labels
                          - source: Value
                            function: MAX
                            column: Total

      - properties:
            margin-top: 20px
        columns:
          - components:
              - displayer:
                  type: BARCHART
                  extraConfiguration: >-
                    {
                      "color" : ["#4695EB"]
                    }
                  general:
                    title: Threads
                  columns:
                    - id: Labels
                      expression: value;
                  lookup:
                    uuid: all_metrics
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - "jvm_threads_states_threads"
                    sort:
                      - column: Total
                        sortOrder: DESCENDING
                    group:
                      - columnGroup:
                          source: Labels
                        functions:
                          - source: Labels
                          - source: Value
                            function: MAX
                            column: Total

  # === Page 2: History ===
  - name: History
    rows:
      - columns:
          - span: 6
            components:
              - displayer:
                  type: TIMESERIES
                  general:
                    title: Heap Memory Usage
                  chart:
                    height: 300
                  lookup:
                    uuid: history
                    filter:
                      - column: metric
                        function: EQUALS_TO
                        args:
                          - jvm_memory_used_bytes
                      - column: labels
                        function: LIKE_TO
                        args:
                          - 'heap%'
                    group:
                      - functions:
                          - source: labels
                          - source: timestamp
                          - source: value
          - span: 6
            components:
              - displayer:
                  type: TIMESERIES
                  general:
                    title: CPU Usage
                  chart:
                    height: 300
                  lookup:
                    uuid: history
                    filter:
                      - column: metric
                        function: EQUALS_TO
                        args:
                          - system_cpu_usage
                    group:
                      - functions:
                          - source: metric
                          - source: timestamp
                          - source: value
      - columns:
          - span: 6
            components:
              - displayer:
                  type: TIMESERIES
                  general:
                    title: Live Threads
                  chart:
                    height: 300
                  lookup:
                    uuid: history
                    filter:
                      - column: metric
                        function: EQUALS_TO
                        args:
                          - jvm_threads_live_threads
                    group:
                      - functions:
                          - source: metric
                          - source: timestamp
                          - source: value
          - span: 6
            components:
              - displayer:
                  type: TIMESERIES
                  general:
                    title: Loaded Classes
                  chart:
                    height: 300
                  lookup:
                    uuid: history
                    filter:
                      - column: metric
                        function: EQUALS_TO
                        args:
                          - jvm_classes_loaded_classes
                    group:
                      - functions:
                          - source: metric
                          - source: timestamp
                          - source: value

  # === Page 3: Live ===
  - name: Live
    rows:
      - columns:
          - components:
              - displayer:
                  type: TIMESERIES
                  general:
                    title: Live CPU Usage (accumulating)
                  chart:
                    height: 350
                    zoom: true
                  lookup:
                    uuid: live_metrics
                    filter:
                      - column: metric
                        function: EQUALS_TO
                        args:
                          - system_cpu_usage
                    group:
                      - functions:
                          - source: metric
                          - source: timestamp
                          - source: value
      - columns:
          - span: 6
            components:
              - displayer:
                  type: TIMESERIES
                  general:
                    title: Live Threads (accumulating)
                  chart:
                    height: 300
                  lookup:
                    uuid: live_metrics
                    filter:
                      - column: metric
                        function: EQUALS_TO
                        args:
                          - jvm_threads_live_threads
                    group:
                      - functions:
                          - source: metric
                          - source: timestamp
                          - source: value
          - span: 6
            components:
              - displayer:
                  type: TIMESERIES
                  general:
                    title: Live Memory (accumulating)
                  chart:
                    height: 300
                  lookup:
                    uuid: live_metrics
                    filter:
                      - column: metric
                        function: EQUALS_TO
                        args:
                          - jvm_memory_used_bytes
                      - column: labels
                        function: LIKE_TO
                        args:
                          - 'heap%'
                    group:
                      - functions:
                          - source: labels
                          - source: timestamp
                          - source: value

navTree:
  root_items:
    - type: GROUP
      id: QuarkusNav
      children:
        - page: Current Status
        - page: History
        - page: Live
