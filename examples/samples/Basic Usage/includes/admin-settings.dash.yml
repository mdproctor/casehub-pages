pages:
  - name: Admin Settings
    rows:
      - columns:
          - components:
              - html: >-
                  <div style="padding: 4px 0 12px; color: #6b7280; font-size: 12px">
                    ↳ Loaded from <code>admin-settings.dash.yml</code> — Admin access required
                  </div>
      - columns:
          - span: 4
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Total Teams
                  columns:
                    - id: Count
                      pattern: "#,##0"
                  lookup:
                    uuid: team_members
                    group:
                      - functions:
                          - source: Team
                            function: COUNT
                            column: Count
          - span: 4
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Total Members
                  columns:
                    - id: Count
                      pattern: "#,##0"
                  lookup:
                    uuid: team_members
                    group:
                      - functions:
                          - source: Member
                            function: COUNT
                            column: Count
          - span: 4
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Departments
                  columns:
                    - id: Count
                      pattern: "#,##0"
                  lookup:
                    uuid: team_members
                    group:
                      - functions:
                          - source: Department
                            function: COUNT
                            column: Count
