# the sheet must be published on the WEB!
properties:
    sheet_id: 1XuyPTyrjMFXQ1ey6Bg9AEcrpwZ60CnLQVEs4-DEDrcc
datasets:
    - uuid: sheet
      url: https://docs.google.com/spreadsheets/d/${sheet_id}/gviz/tq?tqx=out:csv
pages:
    - components:
          - displayer:
                filter:
                    notification: true

                lookup:
                    uuid: sheet
          
          - displayer:
                type: BARCHART
                filter:
                    listening: true
                lookup:
                    uuid: sheet
                    group:
                        - columnGroup:
                              source: A
                          functions:
                              - source: A
                              - source: B
                                function: SUM
                              - source: C
                                function: SUM
