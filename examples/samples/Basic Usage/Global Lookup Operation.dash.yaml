global:
    dataset:
        uuid: global
        content: >-
            [
                ["A", 3],
                ["B", 2],
                ["C", 1],
                ["D", 0],
                ["E", -1],
                ["F", -2],
                ["G", -3],
            ]
    displayer:
        chart:
            resizable: true
        lookup:
            uuid: global
            rowCount: 3
            filter:
                - column: Column 1
                  function: GREATER_THAN
                  args: [-3]
                - column: Column 1
                  function: LOWER_THAN
                  args: [3]
            sort:
                - column: Column 0
                  order: DESCENDING
pages:
    - rows:
          - columns:
                - components:
                    - displayer:
          - columns:
                - span: 4
                  components:
                      - displayer:
                            type: LINECHART
                            general:
                                title: Global Lookup with all rows
                            lookup:
                                rowCount: 10
                - span: 4
                  components:
                      - displayer:
                            type: BARCHART
                            general:
                                title: Values > 0
                            lookup:
                                filter:
                                    - column: Column 1
                                      function: GREATER_THAN
                                      args: [0]
                - span: 4
                  components:
                      - displayer:
                            type: BARCHART
                            subtype: BAR
                            general:
                                title: Values < 0
                            lookup:
                                filter:
                                    - column: Column 1
                                      function: LOWER_THAN
                                      args: [0]
