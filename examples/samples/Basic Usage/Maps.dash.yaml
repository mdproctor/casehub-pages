global:
  displayer:
    chart:
      resizable: true

pages:
  - rows:
      - columns:
          - span: 6
            components:
              - html: "<h4><strong>subtype MAP_REGIONS (default)</strong></h4><br />"
              - displayer:
                  type: MAP
                  lookup:
                    uuid: countries
                    group:
                      - columnGroup:
                          source: Country
                        functions:
                          - source: Country
                          - source: Value
          - span: 6
            components:
              - html: "<h4><strong>subtype MAP_MARKERS</strong></h4><br />"
              - displayer:
                  type: MAP
                  subtype: MAP_MARKERS
                  lookup:
                    uuid: countries
                    group:
                      - columnGroup:
                          source: Country
                        functions:
                          - source: Country
                          - source: Value

datasets:
  - uuid: countries
    content: >-
      [
        ["Brazil", 6],
        ["USA", 3],
        ["China", 5],
        ["India", 5],
        ["Russia", 6],
        ["Canada", 6],
        ["Australia", 9],
        ["Mali", 4],
        ["South Africa", 11]
      ]
    columns:
      - id: Country
        type: LABEL
      - id: Value
        type: NUMBER
