datasets:
  - uuid: demo-data
    content: >
      [
        ["Engineering", "Platform", "45", "Active"],
        ["Engineering", "Frontend", "35", "Active"],
        ["Engineering", "Data", "28", "Active"],
        ["Product", "Core", "30", "Active"],
        ["Product", "Growth", "20", "Active"],
        ["Design", "UX", "18", "Active"],
        ["Design", "Brand", "12", "Active"]
      ]
    columns:
      - id: division
        type: LABEL
      - id: team
        type: TEXT
      - id: headcount
        type: NUMBER
      - id: status
        type: LABEL

pages:
  - name: Carousel and Stack
    components:
      - type: tabs
        properties:
          targetPage: true
        tabs:
          Carousel:
            components:
              - type: markdown
                properties:
                  content: >
                    **Carousel** — a sliding container with prev/next navigation.
                    Each named slot becomes a slide. Only the active slide renders.
              - type: carousel
                sections:
                  Bar Chart:
                    components:
                      - type: title
                        properties:
                          text: Team Headcount
                          size: h3
                      - type: bar-chart
                        properties:
                          lookup:
                            uuid: demo-data
                  Pie Chart:
                    components:
                      - type: title
                        properties:
                          text: Division Breakdown
                          size: h3
                      - type: pie-chart
                        properties:
                          lookup:
                            uuid: demo-data
                            group:
                              - columnGroup:
                                    source: division
                                functions:
                                  - source: division
                                  - source: headcount
                                    function: SUM
                  Data Table:
                    components:
                      - type: data-table
                        properties:
                          lookup:
                            uuid: demo-data
                          sortable: true

          Stack:
            components:
              - type: markdown
                properties:
                  content: >
                    **Stack** — a container where only one child is visible at a time.
                    Unlike carousel, stack has no built-in navigation — it relies on
                    external controls or programmatic switching.
              - type: stack
                sections:
                  Overview:
                    components:
                      - type: metric
                        properties:
                          lookup:
                            uuid: demo-data
                            group:
                              - functions:
                                  - source: headcount
                                    function: SUM
                  Details:
                    components:
                      - type: data-table
                        properties:
                          lookup:
                            uuid: demo-data
                          sortable: true
