datasets:
  - uuid: inventory
    content: >-
      [
        ["Widgets", "Widget A", 142, "In Stock"],
        ["Widgets", "Widget B", 38, "Low Stock"],
        ["Widgets", "Widget C", 210, "In Stock"],
        ["Gadgets", "Gadget X", 0, "Out of Stock"],
        ["Gadgets", "Gadget Y", 85, "In Stock"],
        ["Gadgets", "Gadget Z", 12, "Low Stock"],
        ["Parts", "Part Alpha", 500, "In Stock"],
        ["Parts", "Part Beta", 67, "In Stock"],
        ["Parts", "Part Gamma", 3, "Low Stock"]
      ]
    columns:
      - id: category
        type: LABEL
      - id: product
        type: TEXT
      - id: quantity
        type: NUMBER
      - id: status
        type: LABEL

pages:
  - name: Split and Dock
    components:
      - type: title
        properties:
          text: Split and Dock
          size: h2

      - type: markdown
        properties:
          content: >
            **Split** creates resizable panes with a draggable divider.
            Drag the handle between panes to resize.

      - type: tabs
        properties:
          targetPage: true
        tabs:
          Horizontal Split:
            components:
              - type: markdown
                properties:
                  content: "**Horizontal** — side-by-side panes. Drag the divider to resize."
              - split:
                  direction: horizontal
                  ratio: [60, 40]
                  children:
                    - type: table
                      properties:
                        lookup:
                          uuid: inventory
                        sortable: true
                        filter:
                          notification: true
                    - type: bar-chart
                      properties:
                        chart:
                          height: 300
                        filter:
                          listening: true
                        lookup:
                          uuid: inventory

          Vertical Split:
            components:
              - type: markdown
                properties:
                  content: "**Vertical** — top and bottom panes."
              - split:
                  direction: vertical
                  ratio: [40, 60]
                  children:
                    - type: metric
                      properties:
                        subtype: card
                        lookup:
                          uuid: inventory
                    - type: table
                      properties:
                        lookup:
                          uuid: inventory
                        sortable: true

          Dock Bar:
            components:
              - type: markdown
                properties:
                  content: >
                    **dock-bar** renders icon buttons that toggle panel visibility.
                    Each item's `panelId` matches a component `id` — clicking the
                    button shows or hides that panel.
              - dock-bar:
                  orientation: horizontal
                  items:
                    - icon: "\U0001F4CA"
                      label: Charts
                      panelId: charts-panel
                      defaultOpen: true
                    - icon: "\U0001F4CB"
                      label: Data
                      panelId: data-panel
              - split:
                  direction: horizontal
                  ratio: [50, 50]
                  children:
                    - type: bar-chart
                      id: charts-panel
                      properties:
                        chart:
                          height: 300
                        lookup:
                          uuid: inventory
                    - type: table
                      id: data-panel
                      properties:
                        lookup:
                          uuid: inventory
                        sortable: true

          Three Panel:
            components:
              - type: markdown
                properties:
                  content: "**Nested** — horizontal split with a vertical split inside the right pane."
              - split:
                  direction: horizontal
                  ratio: [30, 70]
                  children:
                    - type: selector
                      properties:
                        subtype: labels
                        filter:
                          notification: true
                        lookup:
                          uuid: inventory
                          group:
                          - columnGroup:
                                source: category
                            functions:
                            - source: category
                    - split:
                        direction: vertical
                        ratio: [50, 50]
                        children:
                          - type: bar-chart
                            properties:
                              chart:
                                height: 250
                              filter:
                                listening: true
                              lookup:
                                uuid: inventory
                          - type: table
                            properties:
                              lookup:
                                uuid: inventory
                              sortable: true
                              filter:
                                listening: true
