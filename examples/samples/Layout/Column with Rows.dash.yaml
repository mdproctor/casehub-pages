datasets:
- uuid: sales
  content: >-
    [
      ["Q1", "North", 120, 85],
      ["Q1", "South", 95, 70],
      ["Q2", "North", 140, 90],
      ["Q2", "South", 110, 80],
      ["Q3", "North", 160, 95],
      ["Q3", "South", 130, 88],
      ["Q4", "North", 180, 100],
      ["Q4", "South", 150, 92]
    ]
  columns:
  - id: Quarter
    type: LABEL
  - id: Region
    type: LABEL
  - id: Revenue
    type: NUMBER
  - id: Target
    type: NUMBER

pages:
- name: Column with Rows
  rows:
  - columns:
    - components:
      - type: title
        properties:
          text: Nested Layout — Columns with Rows
          size: h2

      - type: markdown
        properties:
          content: >
            Demonstrates **nested layout**: a two-column split where the right
            column contains stacked rows. This pattern is common for dashboards
            with a main chart and supporting metrics.

  - columns:
    - span: '7'
      components:
      - type: title
        properties:
          text: Revenue by Quarter
          size: h3
      - type: bar-chart
        properties:
          chart:
            height: 350
          lookup:
            uuid: sales
            group:
            - columnGroup:
                  source: Quarter
              functions:
              - source: Quarter
              - source: Revenue
                function: SUM

    - span: '5'
      rows:
      - columns:
        - components:
          - type: title
            properties:
              text: Revenue by Region
              size: h3
          - type: pie-chart
            properties:
              chart:
                height: 200
              lookup:
                uuid: sales
                group:
                - columnGroup:
                      source: Region
                  functions:
                  - source: Region
                  - source: Revenue
                    function: SUM

      - columns:
        - components:
          - type: metric
            properties:
              subtype: card
              lookup:
                uuid: sales
                group:
                - functions:
                  - source: Revenue
                    function: SUM
                    column: Total Revenue
                  - source: Target
                    function: SUM
                    column: Total Target
