pages:
- name: Admin Settings
  rows:
  - columns:
    - components:
      - html: >-
          <div style="padding: 4px 0 12px; color: #6b7280; font-size: 12px">
            ↳ Loaded from <code>admin-settings.dash.yml</code> — Admin access required
          </div>
  - columns:
    - span: 4
      components:
      - type: title
        properties:
          text: Total Teams
          size: h3
      - type: metric
        properties:
          lookup:
            uuid: team_members
            group:
            - functions:
              - source: Team
                function: COUNT
                column: Count
          columns:
          - id: Count
            pattern: '#,##0'
    - span: 4
      components:
      - type: title
        properties:
          text: Total Members
          size: h3
      - type: metric
        properties:
          lookup:
            uuid: team_members
            group:
            - functions:
              - source: Member
                function: COUNT
                column: Count
          columns:
          - id: Count
            pattern: '#,##0'
    - span: 4
      components:
      - type: title
        properties:
          text: Departments
          size: h3
      - type: metric
        properties:
          lookup:
            uuid: team_members
            group:
            - functions:
              - source: Department
                function: COUNT
                column: Count
          columns:
          - id: Count
            pattern: '#,##0'
