pages:
- name: Reports Detail
  rows:
  - columns:
    - components:
      - html: >-
          <div style="padding: 4px 0 12px; color: #6b7280; font-size: 12px">
            ↳ Loaded from <code>reports.dash.yml</code>
          </div>
  - columns:
    - span: 4
      components:
      - type: metric
        properties:
          title: Reports Generated
          lookup:
            uuid: report-stats
            filter:
            - column: Metric
              function: EQUALS_TO
              args:
              - Generated
            group:
            - functions:
              - source: Count
                function: SUM
          columns:
          - id: Count
            pattern: '#,##0'
    - span: 4
      components:
      - type: metric
        properties:
          title: Avg Generation Time
          lookup:
            uuid: report-stats
            filter:
            - column: Metric
              function: EQUALS_TO
              args:
              - AvgTime
            group:
            - functions:
              - source: Count
                function: SUM
          columns:
          - id: Count
            pattern: '#,##0 ms'
    - span: 4
      components:
      - type: metric
        properties:
          title: Failed Reports
          lookup:
            uuid: report-stats
            filter:
            - column: Metric
              function: EQUALS_TO
              args:
              - Failed
            group:
            - functions:
              - source: Count
                function: SUM
          columns:
          - id: Count
            pattern: '#,##0'
  - columns:
    - components:
      - type: table
        properties:
          title: Recent Report Runs
          pageSize: 6
          sortable: true
          lookup:
            uuid: report-runs
