datasets:
  - uuid: transaction
    content: >-
      [
        [1, "TXN-2026-04521", 125000, "USD", "true", "2026-07-06", "2026-07-06T14:30:00Z", "Multiple rapid transfers to newly opened accounts in high-risk jurisdictions.", "Acme Holdings Ltd", "Shell Corp 42 LLC"]
      ]
    columns:
      - id: id
        type: NUMBER
      - id: transactionId
        type: TEXT
      - id: amount
        type: NUMBER
      - id: currency
        type: LABEL
      - id: flagged
        type: LABEL
      - id: reportDate
        type: DATE
      - id: detectedAt
        type: DATE
      - id: notes
        type: TEXT
      - id: sender
        type: TEXT
      - id: receiver
        type: TEXT

pages:
  - name: Schema Form
    dataScope:
      dataset: transaction
      idColumn: id
    save:
      trigger: auto
      delay: 1000
      adapter: local
    components:
      - type: title
        properties:
          text: Schema-Driven Form
          size: h2

      - type: markdown
        properties:
          content: |
            **`<pages-schema-form>`** renders a JSON Schema as either a read-only
            display or an editable form. It replaces manually wiring individual
            form inputs — pass a schema and data, get a complete form.

            Below: the same AML transaction payload rendered with individual
            form inputs. The TypeScript tab shows how `pages-schema-form`
            produces this from a schema definition automatically.

      - type: title
        properties:
          text: Transaction Details
          size: h3

      - text-input:
          field: transactionId
          label: Transaction ID
          required: true

      - number-input:
          field: amount
          label: Amount
          min: 0

      - dropdown:
          field: currency
          label: Currency
          options:
            values:
              - USD
              - EUR
              - GBP

      - checkbox:
          field: flagged
          label: Flagged

      - date-picker:
          field: reportDate
          label: Report Date

      - type: title
        properties:
          text: Parties
          size: h3

      - text-input:
          field: sender
          label: Sender

      - text-input:
          field: receiver
          label: Receiver

      - type: title
        properties:
          text: Notes
          size: h3

      - textarea:
          field: notes
          label: Notes
          rows: 4
