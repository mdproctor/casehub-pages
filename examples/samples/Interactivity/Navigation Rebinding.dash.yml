pages:
- name: index
  components:
  - html: >-
      <div style="padding: 12px 20px; background: linear-gradient(135deg, #1a1a2e, #16213e); color: #e0e0e0; margin-bottom:
      16px; border-radius: 8px">
        <strong style="font-size: 1.3em">Navigation Rebinding</strong>
        <span style="margin-left: 12px; opacity: 0.7">Same three-level content hierarchy, different navigation wrappers —
      switch pills to compare</span>
      </div>
  - type: pills
    properties:
      width: 100%
      navGroupId: Variants
- name: Tree View
  components:
  - type: tree
    properties:
      navGroupId: MainNav
- name: Tabs View
  components:
  - type: tabs
    properties:
      width: 100%
      navGroupId: MainNav
- name: Menu View
  components:
  - type: menu
    properties:
      width: 100%
      navGroupId: MainNav
- name: Sidebar View
  components:
  - type: sidebar
    properties:
      navGroupId: MainNav
- name: Tiles View
  components:
  - type: tiles
    properties:
      navGroupId: MainNav
- name: Carousel View
  components:
  - type: carousel
    properties:
      navGroupId: MainNav
- name: Accordion View
  components:
  - type: accordion
    properties:
      navGroupId: MainNav
- name: App Grid View
  components:
  - type: app_grid
    properties:
      navGroupId: MainNav
- name: Dashboard
  rows:
  - columns:
    - span: 3
      components:
      - type: metric
        properties:
          title: Total Revenue
          lookup:
            uuid: sales
            group:
            - functions:
              - source: Revenue
                function: SUM
          columns:
          - id: Revenue
            pattern: $#,##0
    - span: 3
      components:
      - type: metric
        properties:
          title: Products
          lookup:
            uuid: sales
            group:
            - columnGroup:
                source: Product
              functions:
              - source: Product
                function: COUNT
          columns:
          - id: Product
            pattern: '#'
    - span: 3
      components:
      - type: metric
        properties:
          title: Regions
          lookup:
            uuid: sales
            group:
            - columnGroup:
                source: Region
              functions:
              - source: Region
                function: COUNT
          columns:
          - id: Region
            pattern: '#'
    - span: 3
      components:
      - type: metric
        properties:
          title: Avg Deal
          lookup:
            uuid: sales
            group:
            - functions:
              - source: Revenue
                function: AVERAGE
          columns:
          - id: Revenue
            pattern: $#,##0
  - columns:
    - span: 6
      components:
      - type: bar-chart
        properties:
          title: Revenue by Product
          lookup:
            uuid: sales
            group:
            - columnGroup:
                source: Product
              functions:
              - source: Product
              - source: Revenue
                function: SUM
    - span: 6
      components:
      - type: line-chart
        properties:
          subtype: smooth
          title: Monthly Trend
          chart:
            height: 250
          lookup:
            uuid: monthly
            group:
            - columnGroup:
                source: Month
              functions:
              - source: Month
              - source: Revenue
              - source: Target
- name: Settings
  components:
  - type: tabs
    properties:
      navGroupId: SettingsPages
- name: Profile
  components:
  - page: Profile Detail
    src: includes/settings-profile.dash.yml
- name: Security
  components:
  - type: table
    properties:
      title: Security Audit Log
      pageSize: 5
      sortable: true
      lookup:
        uuid: security-log
- name: Reports
  components:
  - page: Reports Detail
    src: includes/reports.dash.yml
- name: Sales
  components:
  - type: tabs
    properties:
      navGroupId: SalesPages
- name: Revenue
  rows:
  - columns:
    - span: 6
      components:
      - type: bar-chart
        properties:
          title: Revenue by Product
          lookup:
            uuid: sales
            group:
            - columnGroup:
                source: Product
              functions:
              - source: Product
              - source: Revenue
                function: SUM
    - span: 6
      components:
      - type: pie-chart
        properties:
          subtype: donut
          title: Revenue Share
          lookup:
            uuid: sales
            group:
            - columnGroup:
                source: Region
              functions:
              - source: Region
              - source: Revenue
                function: SUM
- name: Transactions
  components:
  - type: pills
    properties:
      navGroupId: TransactionViews
- name: Txn Table
  components:
  - type: table
    properties:
      title: Recent Transactions
      pageSize: 8
      sortable: true
      filter:
        enabled: true
        notification: true
      lookup:
        uuid: sales
- name: Txn Form
  dataScope:
    dataset: sales
    idColumn: id
  save:
    trigger: auto
    delay: 500
    adapter: local
  components:
  - html: >-
      <div style="display:flex;gap:8px;padding:0 0 12px">
        <button onclick="this.dispatchEvent(new CustomEvent('pages-record-navigate',{bubbles:true,composed:true,detail:{direction:'prev'}}))"
          style="padding:6px 16px;border:1px solid #d0d5dd;border-radius:6px;background:#fff;cursor:pointer;font-size:13px">←
      Previous</button>
        <button onclick="this.dispatchEvent(new CustomEvent('pages-record-navigate',{bubbles:true,composed:true,detail:{direction:'next'}}))"
          style="padding:6px 16px;border:1px solid #d0d5dd;border-radius:6px;background:#fff;cursor:pointer;font-size:13px">Next
      →</button>
      </div>
  - text-input:
      field: Product
      label: Product
  - text-input:
      field: Region
      label: Region
  - number-input:
      field: Revenue
      label: Revenue
- name: Pipeline
  rows:
  - columns:
    - span: 4
      components:
      - type: metric
        properties:
          title: Total Revenue
          lookup:
            uuid: sales
            group:
            - functions:
              - source: Revenue
                function: SUM
          columns:
          - id: Revenue
            pattern: $#,##0
    - span: 4
      components:
      - type: metric
        properties:
          title: Avg Deal Size
          lookup:
            uuid: sales
            group:
            - functions:
              - source: Revenue
                function: AVERAGE
          columns:
          - id: Revenue
            pattern: $#,##0
    - span: 4
      components:
      - type: metric
        properties:
          title: Total Deals
          lookup:
            uuid: sales
            group:
            - functions:
              - source: Revenue
                function: COUNT
          columns:
          - id: Revenue
            pattern: '#'
  - properties:
      margin-top: 20px
    columns:
    - components:
      - type: line-chart
        properties:
          subtype: smooth
          title: Revenue Trend
          chart:
            height: 250
          lookup:
            uuid: monthly
            group:
            - columnGroup:
                source: Month
              functions:
              - source: Month
              - source: Revenue
              - source: Target
- name: Operations
  components:
  - type: tabs
    properties:
      navGroupId: OpsPages
- name: Monitoring
  rows:
  - columns:
    - span: 3
      components:
      - type: metric
        properties:
          title: CPU
          lookup:
            uuid: ops
            filter:
            - column: Metric
              function: EQUALS_TO
              args:
              - CPU
            group:
            - functions:
              - source: Value
                function: MAX
    - span: 3
      components:
      - type: metric
        properties:
          title: Memory
          lookup:
            uuid: ops
            filter:
            - column: Metric
              function: EQUALS_TO
              args:
              - Memory
            group:
            - functions:
              - source: Value
                function: MAX
    - span: 3
      components:
      - type: metric
        properties:
          title: Disk
          lookup:
            uuid: ops
            filter:
            - column: Metric
              function: EQUALS_TO
              args:
              - Disk
            group:
            - functions:
              - source: Value
                function: MAX
    - span: 3
      components:
      - type: metric
        properties:
          title: Network
          lookup:
            uuid: ops
            filter:
            - column: Metric
              function: EQUALS_TO
              args:
              - Network
            group:
            - functions:
              - source: Value
                function: MAX
- name: Services
  rows:
  - columns:
    - span: 6
      components:
      - type: bar-chart
        properties:
          title: Request Latency (ms)
          chart:
            margin:
              left: 100
          lookup:
            uuid: services
            sort:
            - column: Latency
              sortOrder: DESCENDING
            group:
            - columnGroup:
                source: Service
              functions:
              - source: Service
              - source: Latency
                function: AVERAGE
    - span: 6
      components:
      - type: bar-chart
        properties:
          title: Error Rate (%)
          lookup:
            uuid: services
            sort:
            - column: ErrorRate
              sortOrder: DESCENDING
            group:
            - columnGroup:
                source: Service
              functions:
              - source: Service
              - source: ErrorRate
                function: AVERAGE
navTree:
  root_items:
  - type: GROUP
    id: Variants
    children:
    - page: Tree View
    - page: Tabs View
    - page: Menu View
    - page: Sidebar View
    - page: Tiles View
    - page: Carousel View
  - type: GROUP
    id: MainNav
    children:
    - page: Dashboard
    - type: GROUP
      id: Settings
      children:
      - page: Profile
      - page: Security
    - page: Reports
    - type: GROUP
      id: Sales
      children:
      - page: Revenue
      - page: Transactions
      - page: Pipeline
    - type: GROUP
      id: Operations
      children:
      - page: Monitoring
      - page: Services
  - type: GROUP
    id: SettingsPages
    children:
    - page: Profile
    - page: Security
  - type: GROUP
    id: SalesPages
    children:
    - page: Revenue
    - page: Transactions
    - page: Pipeline
  - type: GROUP
    id: TransactionViews
    children:
    - page: Txn Table
    - page: Txn Form
  - type: GROUP
    id: OpsPages
    children:
    - page: Monitoring
    - page: Services
