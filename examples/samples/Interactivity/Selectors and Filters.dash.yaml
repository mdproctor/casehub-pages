pages:
- name: index
  properties:
    margin: 10px
  components:
  - type: tabs
    properties:
      width: 100%
      navGroupId: SelectorsNav
      targetDivId: selectors_div
  - div: selectors_div
- name: Selectors
  components:
  - html: >-
      <p>Melviz Displayers can filter each other. For filtering only we have selectors components. You can enable filter using
      the filter section, the component that filter others:<br /> <pre> filter:
          notification: true</pre>
      </p><p>
        Then on the component that will be filtered:<pre>
      filter:
          listening: true</pre>
      </p>
  - html: <strong> Default Selector </strong>
  - type: selector
    properties:
      filter:
        enabled: true
        notification: true
        listening: false
        selfapply: false
      lookup:
        uuid: products
        group:
        - columnGroup:
            source: Section
          functions:
          - source: Section
  - html: <br /><strong>subtype SELECTOR_LABELS (used only with LABEL column types)</strong>
  - type: selector
    properties:
      subtype: labels
      filter:
        notification: true
      lookup:
        uuid: products
        group:
        - columnGroup:
            source: Section
          functions:
          - source: Section
  - type: bar-chart
    properties:
      filter:
        listening: true
      lookup:
        uuid: products
        group:
        - columnGroup:
            source: Product
          functions:
          - source: Product
          - source: Quantity
          - source: Quantity2
- name: Filter with Chart
  components:
  - type: selector
    properties:
      filter:
        enabled: true
        notification: true
      lookup:
        uuid: products
        group:
        - columnGroup:
            source: Section
          functions:
          - source: Section
  - type: bar-chart
    properties:
      filter:
        listening: true
      lookup:
        uuid: products
        group:
        - columnGroup:
            source: Product
          functions:
          - source: Product
          - source: Quantity
            function: SUM
          - source: Quantity2
            function: SUM
- name: Filter with Table
  components:
  - type: selector
    properties:
      subtype: labels
      filter:
        notification: true
      lookup:
        uuid: products
        group:
        - columnGroup:
            source: Section
          functions:
          - source: Section
  - type: table
    properties:
      filter:
        listening: true
      lookup:
        uuid: products
navTree:
  root_items:
  - type: GROUP
    id: SelectorsNav
    children:
    - page: Selectors
    - page: Filter with Chart
    - page: Filter with Table
datasets:
- uuid: products
  content: >-
    [
      ["Computers", "Scanner", 5, 3],
      ["Computers", "Printer", 7, 4],
      ["Computers", "Laptop", 3, 2],
      ["Electronics", "Camera", 10, 7],
      ["Electronics", "Headphones", 5, 9]
    ]
  columns:
  - id: Section
    type: LABEL
  - id: Product
    type: LABEL
  - id: Quantity
    type: NUMBER
  - id: Quantity2
    type: NUMBER
