properties:
  metricsUrl: /data/quarkus/metrics
  historyUrl: /data/quarkus/history.json
datasets:
- uuid: history
  content: >-
    [
      ["jvm_memory_used_bytes", "area=heap,id=G1 Eden", 42991616, 1719849600],
      ["jvm_memory_used_bytes", "area=heap,id=G1 Eden", 48234496, 1719849602],
      ["jvm_memory_used_bytes", "area=heap,id=G1 Eden", 35127296, 1719849604],
      ["jvm_memory_used_bytes", "area=heap,id=G1 Old Gen", 28311552, 1719849600],
      ["jvm_memory_used_bytes", "area=heap,id=G1 Old Gen", 28573696, 1719849602],
      ["jvm_memory_used_bytes", "area=heap,id=G1 Old Gen", 29097984, 1719849604],
      ["jvm_memory_used_bytes", "area=nonheap,id=Metaspace", 65011712, 1719849600],
      ["jvm_memory_used_bytes", "area=nonheap,id=Metaspace", 65273856, 1719849602],
      ["jvm_threads_live_threads", "", 42, 1719849600],
      ["jvm_threads_live_threads", "", 44, 1719849602],
      ["jvm_threads_live_threads", "", 43, 1719849604],
      ["jvm_classes_loaded_classes", "", 12845, 1719849600],
      ["jvm_classes_loaded_classes", "", 12847, 1719849602],
      ["jvm_classes_loaded_classes", "", 12848, 1719849604],
      ["system_cpu_usage", "", 0.23, 1719849600],
      ["system_cpu_usage", "", 0.31, 1719849602],
      ["system_cpu_usage", "", 0.18, 1719849604],
      ["process_cpu_usage", "", 0.12, 1719849600],
      ["process_cpu_usage", "", 0.19, 1719849602],
      ["process_cpu_usage", "", 0.09, 1719849604]
    ]
  columns:
  - id: metric
    type: LABEL
  - id: labels
    type: LABEL
  - id: value
    type: NUMBER
  - id: timestamp
    type: NUMBER
pages:
- properties:
    margin-left: 10px
  rows:
  - columns:
    - span: 6
      components:
      - type: table
        properties:
          lookup:
            group:
            - columnGroup:
                source: timestamp
              functions:
              - source: metric
              - source: timestamp
              - source: value
                function: SUM
            uuid: history
  - columns:
    - span: 6
      components:
      - type: title
        properties:
          text: Heap Memory Usage
          size: h3
      - type: timeseries
        properties:
          chart:
            height: 300
          lookup:
            uuid: history
            filter:
            - column: metric
              function: EQUALS_TO
              args:
              - jvm_memory_used_bytes
            - column: labels
              function: LIKE_TO
              args:
              - '%heap%'
            group:
            - functions:
              - source: labels
              - source: timestamp
              - source: value
    - span: 6
      components:
      - type: title
        properties:
          text: Live Threads
          size: h3
      - type: timeseries
        properties:
          chart:
            height: 300
          lookup:
            uuid: history
            filter:
            - column: metric
              function: EQUALS_TO
              args:
              - jvm_threads_live_threads
            group:
            - functions:
              - source: metric
              - source: timestamp
              - source: value
  - properties:
      margin-top: 20px
    columns:
    - span: 6
      components:
      - type: title
        properties:
          text: Loaded Classes
          size: h3
      - type: timeseries
        properties:
          chart:
            height: 300
          lookup:
            uuid: history
            filter:
            - column: metric
              function: EQUALS_TO
              args:
              - jvm_classes_loaded_classes
            group:
            - functions:
              - source: metric
              - source: timestamp
              - source: value
    - span: 6
      components:
      - type: title
        properties:
          text: CPU Usage
          size: h3
      - type: timeseries
        properties:
          chart:
            height: 300
          lookup:
            uuid: history
            filter:
            - column: metric
              function: EQUALS_TO
              args:
              - system_cpu_usage
            group:
            - functions:
              - source: metric
              - source: timestamp
              - source: value
