properties:
  metricsUrl: /data/quarkus/metrics
  historyUrl: /data/quarkus/history.json
datasets:
- uuid: history
  url: ${historyUrl}
  columns:
  - id: metric
    type: LABEL
  - id: labels
    type: LABEL
  - id: value
    type: NUMBER
  - id: timestamp
    type: NUMBER
- uuid: metrics
  url: ${metricsUrl}
  accumulate: true
  cacheMaxRows: 30000
  refreshTime: 2second
  expression: >-
    $map($, function($v){
        [$v[0], $v[1], $v[2] = 'NaN' ? -1 : $v[2], $now() ~> $toMillis()]
    })
  columns:
  - id: metric
    type: label
  - id: labels
    type: label
  - id: value
    type: number
  - id: register
    type: number
pages:
- properties:
    margin-left: 10px
  rows:
  - columns:
    - span: 6
      components:
      - type: table
        properties:
          lookup:
            group:
            - columnGroup:
                source: register
              functions:
              - source: metric
              - source: register
              - source: value
                function: SUM
            uuid: history
  - columns:
    - span: 6
      components:
      - type: timeseries
        properties:
          title: Heap Memory Usage
          chart:
            height: 300
          lookup:
            uuid: history
            filter:
            - column: metric
              function: EQUALS_TO
              args:
              - jvm_memory_used_bytes
            - column: labels
              function: LIKE_TO
              args:
              - '%heap%'
            group:
            - functions:
              - source: labels
              - source: timestamp
              - source: value
    - span: 6
      components:
      - type: timeseries
        properties:
          title: Live Threads
          chart:
            height: 300
          lookup:
            uuid: history
            filter:
            - column: metric
              function: EQUALS_TO
              args:
              - jvm_threads_live_threads
            group:
            - functions:
              - source: metric
              - source: timestamp
              - source: value
  - properties:
      margin-top: 20px
    columns:
    - span: 6
      components:
      - type: timeseries
        properties:
          title: Loaded Classes
          chart:
            height: 300
          lookup:
            uuid: history
            filter:
            - column: metric
              function: EQUALS_TO
              args:
              - jvm_classes_loaded_classes
            group:
            - functions:
              - source: metric
              - source: timestamp
              - source: value
    - span: 6
      components:
      - type: timeseries
        properties:
          title: CPU Usage
          chart:
            height: 300
          lookup:
            uuid: history
            filter:
            - column: metric
              function: EQUALS_TO
              args:
              - system_cpu_usage
            group:
            - functions:
              - source: metric
              - source: timestamp
              - source: value
