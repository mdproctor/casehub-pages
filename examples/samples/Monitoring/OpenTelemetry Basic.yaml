    properties:
      chart:
        resizable: true
        height: 700
        zoom: true
      filter:
        listening: true
      lookup:
        uuid: traces
        group:
        - functions:
          - source: Start Time
          - source: Duration
          - source: Duration
          - source: Operation
      axis:
        x:
          labels_show: false
