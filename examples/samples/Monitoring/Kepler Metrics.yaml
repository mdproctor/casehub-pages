pages:
- name: index
  properties:
    margin: 10px
  components:
  - title: Kepler Metrics
  - type: tabs
    properties:
      navGroupId: Metrics
      targetDivId: Metrics_Div
  - div: Metrics_Div
- name: Monitoring
  rows:
  - properties:
      margin: 10px
      margin-top: 30px
    columns:
    - components:
      - type: title
        properties:
          text: Joules by Container over time
          size: h3
      - type: timeseries
        properties:
          filter:
            listening: true
          lookup:
            uuid: monitoring
            group:
            - functions:
              - source: Container
              - source: Timestamp
              - source: Total
- name: Joules by Node
  properties:
    margin: 20px
  components:
  - markdown: '### **Filter**'
  - type: selector
    properties:
      filter:
        notification: true
      lookup:
        uuid: joules_by_node
        group:
        - columnGroup:
            source: Node
          functions:
          - source: Node
  - type: title
    properties:
      text: Total Joules by Node
      size: h3
  - type: metric
    properties:
      filter:
        listening: true
      lookup:
        uuid: joules_by_node
        group:
        - functions:
          - source: Value
            function: SUM
      columns:
      - id: Total
        pattern: '###,###.000'
  - type: title
    properties:
      text: Joules by Node
      size: h3
  - type: bar-chart
    properties:
      chart:
        height: 400
      filter:
        listening: true
      lookup:
        uuid: joules_by_node
        group:
        - columnGroup:
            source: Node
          functions:
          - source: Node
          - source: Package
            function: SUM
          - source: Core
            function: SUM
          - source: DRAM
            function: SUM
          - source: Uncore
            function: SUM
          - source: Other Host
            function: SUM
          - source: GPU
            function: SUM
- name: Joules by Container
  properties:
    margin: 20px
  components:
  - markdown: '### **Filter**'
  - type: selector
    properties:
      filter:
        notification: true
      lookup:
        uuid: joules_by_container
        group:
        - columnGroup:
            source: Container
          functions:
          - source: Container
  - type: selector
    properties:
      filter:
        notification: true
        listening: true
      lookup:
        uuid: joules_by_container
        group:
        - columnGroup:
            source: Pod
          functions:
          - source: Pod
  - type: title
    properties:
      text: Total Joules by Container
      size: h3
  - type: metric
    properties:
      filter:
        listening: true
      lookup:
        uuid: joules_by_container
        group:
        - functions:
          - source: Total
            function: SUM
      columns:
      - id: Total
        pattern: '###,###.000'
  - type: title
    properties:
      text: Joules by Container
      size: h3
  - type: bar-chart
    properties:
      chart:
        height: 400
      filter:
        listening: true
      lookup:
        uuid: joules_by_container
        group:
        - columnGroup:
            source: Container
          functions:
          - source: Container
          - source: Package
            function: SUM
          - source: Core
            function: SUM
          - source: DRAM
            function: SUM
          - source: Uncore
            function: SUM
          - source: Other Host
            function: SUM
          - source: GPU
            function: SUM
navTree:
  root_items:
  - type: GROUP
    id: Metrics
    children:
    - page: Joules by Node
    - page: Joules by Container
    - page: Monitoring
