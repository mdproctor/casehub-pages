properties:
  kepler_metrics_url: data/kepler/metrics
global:
  mode: dark
datasets:
- uuid: metrics
  url: ${kepler_metrics_url}
  cacheEnabled: true
  refreshTime: 5second
- uuid: joules_by_container
  url: ${kepler_metrics_url}
  cacheEnabled: true
  expression: >-
    $ [$contains($[0], /kepler_container.*joules_total/) and $[2] != "0"].[
      $replace($[1], /(.+)container_name="([0-9a-zA-Z-_]+)",(.+)/, "$2"),
      $replace($[1], /(.+)pod_name="([0-9a-zA-Z-_]+)"/, "$2"),
      $[0] = "kepler_container_joules_total" ? $[2] : "0",
      $[0] = "kepler_container_core_joules_total" ? $[2] : "0",
      $[0] = "kepler_container_dram_joules_total" ? $[2] : "0",
      $[0] = "kepler_container_uncore_joules_total" ? $[2] : "0",
      $[0] = "kepler_container_package_joules_total" ? $[2] : "0",
      $[0] = "kepler_container_gpu_joules_total" ? $[2] : "0",
      $[0] = "kepler_container_other_host_components_joules_total" ? $[2] : "0"
    ]
  columns:
  - id: Container
  - id: Pod
  - id: Total
    type: NUMBER
  - id: Core
    type: NUMBER
  - id: DRAM
    type: NUMBER
  - id: Uncore
    type: NUMBER
  - id: Package
    type: NUMBER
  - id: Other Host
    type: NUMBER
  - id: GPU
    type: NUMBER
- uuid: joules_by_node
  url: ${kepler_metrics_url}
  cacheEnabled: true
  expression: "$ [$contains($[0], /kepler_node.*joules_total/) and $[2] != \"0\"].[\n  $replace($[1], /instance=\"([0-9a-zA-Z-_]+)\"\
    ,(.+)/, \"$1\"),        \n  $[0] = \"kepler_node_core_joules_total\" ? $[2] : \"0\",\n  $[0] = \"kepler_node_dram_joules_total\"\
    \ ? $[2] : \"0\",\n  $[0] = \"kepler_node_uncore_joules_total\" ? $[2] : \"0\",\n  $[0] = \"kepler_node_package_joules_total\"\
    \ ? $[2] : \"0\",\n  $[0] = \"kepler_node_gpu_joules_total\" ? $[2] : \"0\",\n  $[0] = \"kepler_node_other_host_components_joules_total\"\
    \ ? $[2] : \"0\",\n  $[2]\n  \n]"
  columns:
  - id: Node
  - id: Core
    type: NUMBER
  - id: DRAM
    type: NUMBER
  - id: Uncore
    type: NUMBER
  - id: Package
    type: NUMBER
  - id: Other Host
    type: NUMBER
  - id: GPU
    type: NUMBER
  - id: Value
    type: NUMBER
- uuid: monitoring
  url: ${kepler_metrics_url}
  cacheEnabled: true
  accumulate: true
  refreshTime: 5second
  expression: "(\n  $now := $now() ~> $toMillis();\n  $[$[0] = \"kepler_container_joules_total\" and $[2] != \"0\"].[\n  \
    \  $replace($[1], /(.+)container_namespace=\"([0-9a-zA-Z-_]+)\",(.+)/, \"$2\"),\n    $replace($[1], /(.+)container_name=\"\
    ([0-9a-zA-Z-_]+)\",(.+)/, \"$2\"),        \n    $[2],\n    $now\n  ]\n)"
  columns:
  - id: Namespace
  - id: Container
  - id: Total
    type: NUMBER
  - id: Timestamp
    type: NUMBER
pages:
- name: index
  properties:
    margin: 10px
  components:
  - title: Kepler Metrics
  - type: tabs
    properties:
      navGroupId: Metrics
      targetDivId: Metrics_Div
  - div: Metrics_Div
- name: Monitoring
  rows:
  - properties:
      margin: 10px
      margin-top: 30px
    columns:
    - components:
      - type: timeseries
        properties:
          title: Joules by Container over time
          filter:
            listening: true
          lookup:
            uuid: monitoring
            group:
            - functions:
              - source: Container
              - source: Timestamp
              - source: Total
- name: Joules by Node
  properties:
    margin: 20px
  components:
  - markdown: '### **Filter**'
  - type: selector
    properties:
      filter:
        notification: true
      lookup:
        uuid: joules_by_node
        group:
        - columnGroup:
            source: Node
          functions:
          - source: Node
  - type: metric
    properties:
      title: Total Joules by Node
      filter:
        listening: true
      lookup:
        uuid: joules_by_node
        group:
        - functions:
          - source: Value
            function: SUM
      columns:
      - id: Total
        pattern: '###,###.000'
  - type: bar-chart
    properties:
      title: Joules by Node
      chart:
        height: 400
      filter:
        listening: true
      lookup:
        uuid: joules_by_node
        group:
        - columnGroup:
            source: Node
          functions:
          - source: Node
          - source: Package
            function: SUM
          - source: Core
            function: SUM
          - source: DRAM
            function: SUM
          - source: Uncore
            function: SUM
          - source: Other Host
            function: SUM
          - source: GPU
            function: SUM
- name: Joules by Container
  properties:
    margin: 20px
  components:
  - markdown: '### **Filter**'
  - type: selector
    properties:
      filter:
        notification: true
      lookup:
        uuid: joules_by_container
        group:
        - columnGroup:
            source: Container
          functions:
          - source: Container
  - type: selector
    properties:
      filter:
        notification: true
        listening: true
      lookup:
        uuid: joules_by_container
        group:
        - columnGroup:
            source: Pod
          functions:
          - source: Pod
  - type: metric
    properties:
      title: Total Joules by Container
      filter:
        listening: true
      lookup:
        uuid: joules_by_container
        group:
        - functions:
          - source: Total
            function: SUM
      columns:
      - id: Total
        pattern: '###,###.000'
  - type: bar-chart
    properties:
      title: Joules by Container
      chart:
        height: 400
      filter:
        listening: true
      lookup:
        uuid: joules_by_container
        group:
        - columnGroup:
            source: Container
          functions:
          - source: Container
          - source: Package
            function: SUM
          - source: Core
            function: SUM
          - source: DRAM
            function: SUM
          - source: Uncore
            function: SUM
          - source: Other Host
            function: SUM
          - source: GPU
            function: SUM
navTree:
  root_items:
  - type: GROUP
    id: Metrics
    children:
    - page: Joules by Node
    - page: Joules by Container
    - page: Monitoring
