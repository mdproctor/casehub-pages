properties:
  prometheusUrl: http://localhost:9090
  query: go_gc_heap_live_bytes[1m:1s]
datasets:
- uuid: prometheus
  type: prometheus
  url: ${prometheusUrl}/api/v1/query?query=${query}
- uuid: prometheus_instant
  type: prometheus
  url: ${prometheusUrl}/api/v1/query?query=prometheus_http_requests_total
pages:
- rows:
  - columns:
    - components:
      - properties:
          background-color: '#e65100'
          color: white
          padding: 16px 24px
          border-radius: 8px
          margin-bottom: 16px
        html: '<strong style="font-size: 20px; font-family: sans-serif;">Prometheus Metrics Explorer</strong> <br/><span style="opacity:
          0.8; font-size: 13px;">Query: <code>${query}</code> &middot; Source: <code>${prometheusUrl}</code></span>'
  - properties:
      margin-bottom: 24px
    columns:
    - span: '3'
      components:
      - type: metric
        properties:
          title: Data Points
          lookup:
            uuid: prometheus
            group:
            - functions:
              - source: value
                function: COUNT
    - span: '3'
      properties:
        color: '#e65100'
      components:
      - type: metric
        properties:
          title: Max Value
          lookup:
            uuid: prometheus
            group:
            - functions:
              - source: value
                function: MAX
          columns:
          - id: value
            pattern: '#,000'
    - span: '3'
      properties:
        color: '#2e7d32'
      components:
      - type: metric
        properties:
          title: Min Value
          lookup:
            uuid: prometheus
            group:
            - functions:
              - source: value
                function: MIN
          columns:
          - id: value
            pattern: '#,000'
    - span: '3'
      properties:
        color: '#1565c0'
      components:
      - type: metric
        properties:
          title: Average
          lookup:
            uuid: prometheus
            group:
            - functions:
              - source: value
                function: AVERAGE
          columns:
          - id: value
            pattern: '#,000.00'
  - properties:
      margin-bottom: 24px
    columns:
    - components:
      - type: timeseries
        properties:
          title: Metric Values Over Time
          chart:
            height: 350
          lookup:
            uuid: prometheus
            group:
            - functions:
              - source: __name__
              - source: timestamp
              - source: value
  - properties:
      margin-bottom: 24px
    columns:
    - span: '6'
      components:
      - type: area-chart
        properties:
          title: Value Distribution (Area)
          chart:
            height: 280
          lookup:
            uuid: prometheus
            group:
            - functions:
              - source: handler
              - source: timestamp
              - source: value
    - span: '6'
      components:
      - type: bar-chart
        properties:
          title: Total by Endpoint
          chart:
            height: 280
          lookup:
            uuid: prometheus_instant
            group:
            - columnGroup:
                source: handler
              functions:
              - source: handler
              - source: value
                function: SUM
  - columns:
    - span: '4'
      components:
      - type: pie-chart
        properties:
          title: Request Share by Method
          chart:
            height: 300
          lookup:
            uuid: prometheus_instant
            group:
            - columnGroup:
                source: method
              functions:
              - source: method
              - source: value
                function: SUM
    - span: '8'
      components:
      - type: table
        properties:
          title: Raw Metrics
          sortable: true
          show_column_picker: true
          lookup:
            uuid: prometheus
