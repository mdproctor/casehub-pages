properties:
  token: your token here
  authorizationHeader: Basic ${token}
  towerUrl: your tower url here
  proxyUrl: a proxy to make HTTP requests if CORS is not enabled
  subTitlesStyle: 'font-size: large; margin: 15px 0 10px 0'
datasets:
- uuid: metrics
  content: >-
    [
      ["awx_sessions_total", "type=\"all\"", 47],
      ["awx_sessions_total", "type=\"user\"", 38],
      ["awx_users_total", "", 156],
      ["awx_teams_total", "", 12],
      ["awx_organizations_total", "", 4],
      ["awx_inventories_total", "", 23],
      ["awx_projects_total", "", 35],
      ["awx_job_templates_total", "", 89],
      ["awx_inventory_scripts_total", "", 7],
      ["awx_running_jobs_total", "", 5],
      ["awx_pending_jobs_total", "", 2],
      ["awx_hosts_total", "type=\"all\"", 342],
      ["awx_hosts_total", "type=\"active\"", 287],
      ["awx_schedules_total", "", 18],
      ["awx_custom_virtualenvs_total", "", 3],
      ["awx_instance_capacity", "", 200],
      ["awx_instance_remaining_capacity", "", 124],
      ["awx_status_total", "status=\"successful\"", 14523],
      ["awx_status_total", "status=\"failed\"", 237],
      ["awx_status_total", "status=\"error\"", 15]
    ]
  columns:
  - id: metric
    type: LABEL
  - id: labels
    type: LABEL
  - id: Value
    type: Number

pages:
- properties:
    margin-left: 5px
  rows:
  - columns:
    - components:
      - html: >-
          <p>
            <a href="${towerUrl}" style="font-size: xx-large">Ansible Tower</a>
            <small>Metrics Summary</small>
          </p> <hr />
  - columns:
    - components:
      - html: <p style="${subTitlesStyle}">Access</p>
  - columns:
    - span: '3'
      components:
      - type: title
        properties:
          text: Active Sessions
          size: h3
      - type: metric
        properties:
          lookup:
            filter:
            - column: metric
              function: EQUALS_TO
              args:
              - awx_sessions_total
            - column: labels
              function: EQUALS_TO
              args:
              - type="all"
            group:
            - functions:
              - source: value
            uuid: metrics
    - span: '3'
      components:
      - type: title
        properties:
          text: Users
          size: h3
      - type: metric
        properties:
          lookup:
            filter:
