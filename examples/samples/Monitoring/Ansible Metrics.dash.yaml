properties:
  token: your token here
  authorizationHeader: Basic ${token}
  towerUrl: your tower url here
  proxyUrl: a proxy to make HTTP requests if CORS is not enabled
  subTitlesStyle: 'font-size: large; margin: 15px 0 10px 0'
datasets:
- uuid: metrics
  url: data/metrics
  cacheEnabled: true
  refreshTime: 1minute
  columns:
  - id: metric
    type: LABEL
  - id: labels
    type: LABEL
  - id: Value
    type: Number
  headers:
    Authorization: ${authorizationHeader}
    Content-Type: text/plain
    Target-Url: ${towerUrl}/api/v2/metrics/?metrics
pages:
- properties:
    margin-left: 5px
  rows:
  - columns:
    - components:
      - html: >-
          <p>
            <a href="${towerUrl}" style="font-size: xx-large">Ansible Tower</a>
            <small>Metrics Summary</small>
          </p> <hr />
  - columns:
    - components:
      - html: <p style="${subTitlesStyle}">Access</p>
  - columns:
    - span: '3'
      components:
      - type: metric
        properties:
          title: Active Sessions
          lookup:
            filter:
            - column: metric
              function: EQUALS_TO
              args:
              - awx_sessions_total
            - column: labels
              function: EQUALS_TO
              args:
              - type="all"
            group:
            - functions:
              - source: value
            uuid: metrics
    - span: '3'
      components:
      - type: metric
        properties:
          title: Users
          lookup:
            filter:
            - column: metric
              function: EQUALS_TO
              args:
              - awx_users_total
            group:
            - functions:
              - source: value
            uuid: metrics
    - span: '3'
