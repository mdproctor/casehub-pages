    columns:
      - id: id
        type: TEXT
      - id: name
        type: TEXT
      - id: department
        type: LABEL
      - id: role
        type: TEXT
      - id: joined
        type: NUMBER
      - id: salary
        type: NUMBER
      - id: skills
        type: TEXT
      - id: notes
        type: TEXT

pages:
  - name: Row Detail
    components:
      - type: title
        properties:
          text: Row Detail Expansion
          size: h2

      - type: markdown
        properties:
          content: |
            Click the **▶** chevron to expand a row and see additional detail
            columns below it. In **multi** mode, several rows can be open at
            once and the header chevron toggles all.

            The main table shows ID, Name, Department, and Role. The detail
            panel reveals Skills and Notes — columns that would clutter the
            main grid but are useful on demand.

      - type: tabs
        properties:
          targetPage: true
        tabs:
          Multi Mode:
            components:
              - type: data-table
                properties:
                  lookup:
                    uuid: employees
                  sortable: true
                  columns:
                    - id: id
                      name: ID
                    - id: name
                      name: Name
                    - id: department
                      name: Dept
                    - id: role
                      name: Role
                  rowDetail:
                    mode: multi
                    columns:
                      - id: joined
                        label: Joined
                      - id: salary
                        label: Salary
                      - id: skills
                        label: Skills
                      - id: notes
                        label: Notes

          Single Mode:
            components:
              - type: markdown
                properties:
                  content: >
                    **Single mode** (default) — expanding one row automatically
                    collapses the previously open row.
              - type: data-table
                properties:
                  lookup:
                    uuid: employees
                  sortable: true
                  columns:
                    - id: id
                      name: ID
                    - id: name
                      name: Name
                    - id: department
                      name: Dept
                    - id: role
                      name: Role
                  rowDetail:
                    columns:
                      - id: joined
                        label: Joined
                      - id: salary
                        label: Salary
                      - id: skills
                        label: Skills
                      - id: notes
                        label: Notes
