datasets:
  - uuid: employees
    content: >-
      [
        ["EMP-001", "Alice Johnson", "Engineering", "Senior Developer", 2018, 92000, "Python, Go, Kubernetes", "Platform team lead, owns deployment pipeline"],
        ["EMP-002", "Bob Smith", "Marketing", "Marketing Manager", 2019, 78000, "SEO, Analytics, Figma", "Manages brand campaigns and content calendar"],
        ["EMP-003", "Charlie Brown", "Engineering", "Staff Engineer", 2016, 115000, "Java, Rust, Distributed Systems", "Architecture council member, mentors juniors"],
        ["EMP-004", "Diana Ross", "Sales", "Account Executive", 2021, 65000, "Salesforce, HubSpot", "Handles enterprise accounts, EMEA region"],
        ["EMP-005", "Eve Wilson", "Engineering", "Junior Developer", 2023, 58000, "TypeScript, React", "Onboarding — paired with Charlie for first quarter"],
        ["EMP-006", "Frank Miller", "Marketing", "Content Writer", 2020, 52000, "Copywriting, WordPress", "Blog and newsletter, 3 posts per week cadence"],
        ["EMP-007", "Grace Lee", "Sales", "Sales Director", 2017, 105000, "Strategy, Negotiation", "Leads APAC expansion, reports to VP Sales"],
        ["EMP-008", "Henry Davis", "Engineering", "DevOps Engineer", 2019, 88000, "Terraform, AWS, GitHub Actions", "On-call rotation lead, SLA owner"]
