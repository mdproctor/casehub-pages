pages:
  - name: Project Roadmap
    components:
      - type: title
        properties:
          text: Cross-Repo Roadmap — Gantt Chart with Critical Path (v4)
          size: h2

      - type: markdown
        properties:
          content: |
            Generated 2026-07-16 · All repos scanned · ✅ Done · ✅ Done since v3 · 🔵 Open · 🟠 Blocked

      - html: >
          <div style="background: #f8f8f8; padding: 10px 15px; border-radius: 6px; margin: 10px 0; font-size: 13px;">
          <strong>Since v3 (2026-07-14):</strong> 7 devtown issues closed (#104, #124, #127, #134, #135, #136, #150),
          plus blocks-ui#38, parent#361. Trust &amp; CBR layer is now <strong>fully complete</strong> (only UI-blocked #98 remains).
          Merge Queue layer has only UI-blocked items and the cross-repo epic remaining.
          blocks-ui#41 (devtown governance workbench migration) remains the critical UI gate.
          </div>

      - type: tabs
        tabs:
          Rounded Borders:
            components:
              - type: legend
                properties:
                  entries:
                    - label: devtown
                      color: "#1976d2"
                    - label: engine
                      color: "#388e3c"
                    - label: blocks
                      color: "#7cb342"
                    - label: blocks-ui
                      color: "#f57c00"
                    - label: pages
                      color: "#e91e63"
                    - label: parent
                      color: "#607d8b"
                    - label: work
                      color: "#5c6bc0"
                    - label: qhorus
                      color: "#00897b"
                    - label: claudony
                      color: "#8e24aa"
                    - label: platform
                      color: "#455a64"
                    - label: ledger
                      color: "#c62828"
                  layout: linear

              - html: '<h3 style="border-bottom:2px solid #333; padding-bottom:5px; margin:20px 0 10px 0; font-size:16px;">UI Pipeline (cross-cutting)</h3>'
              - html: >
                  <div style="background:#fff3e0; border:2px solid #f57c00; border-radius:6px; padding:8px 12px; margin:8px 0; display:inline-block; font-weight:bold; font-size:12px;">
                  🚧 GATE: blocks-ui#41 — unblocks ALL devtown UI</div>

              - type: data-table
                style:
                  border: "1px solid #ddd"
                  border-radius: "8px"
                  padding: "15px"
                  margin-bottom: "20px"
                  overflow: hidden
                properties:
                  lookup:
                    uuid: ui-pipeline
                  pageSize: 25
                  columns:
                    - id: repo
                      name: Repo
                      width: "100px"
                      pill:
                        blocks: "#7cb342"
                        blocks-ui: "#f57c00"
                        pages: "#e91e63"
                        devtown: "#1976d2"
                        parent: "#607d8b"
                        work: "#5c6bc0"
                        platform: "#455a64"
                    - id: issue
                      name: Issue
                      width: "130px"
                    - id: title
                      name: Title
                      width: "3fr"
                    - id: status
                      name: Status
                      width: "140px"
                      expression: >-
                        $lookup({"done":"✅ DONE","newly-done":"✅ Done since v3","open":"🔵 OPEN","blocked":"🟠 BLOCKED","critical":"🔵 OPEN","new":"🆕 NEW"}, value)
                    - id: notes
                      name: Notes
                      width: "2fr"
                  rowAccent:
                    column: status
                    columns: all
                    colorMap:
                      newly-done: "#2e7d32"
                      critical: "#d32f2f"
                      blocked: "#e65100"
                  rowStyle:
                    - condition: "#{row.status} == 'done'"
                      style:
                        backgroundColor: "#f0faf0"
                        color: "#2d7d2d"
                    - condition: "#{row.status} == 'newly-done'"
                      style:
                        backgroundColor: "#e8f5e9"
                        color: "#2e7d32"
                    - condition: "#{row.status} == 'blocked'"
                      style:
                        backgroundColor: "#fff8f0"
                        color: "#b35900"
                    - condition: "#{row.status} == 'critical'"
                      style:
                        backgroundColor: "#fff0f0"
                    - condition: "#{row.status} == 'new'"
                      style:
                        backgroundColor: "#f0f5ff"

              - html: '<h3 style="border-bottom:2px solid #333; padding-bottom:5px; margin:20px 0 10px 0; font-size:16px;">Trust &amp; CBR</h3>'
              - type: data-table
                style:
