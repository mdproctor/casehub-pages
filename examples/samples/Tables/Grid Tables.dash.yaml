pages:
  - name: Grid Tables
    components:
      - type: title
        properties:
          text: Grid Table Patterns
          size: h2

      - type: markdown
        properties:
          content: |
            The `grid-table` component renders information grids — fixed-layout
            displays for feature matrices, status dashboards, scorecards, and
            cross-tabulations. Unlike `data-table`, there is no sorting, filtering,
            or pagination — just clean, styled information display.

      # ── Feature Matrix (boolean cells, cross-matrix) ──────────────
      - type: title
        properties:
          text: "Feature Matrix — boolean cells"
          size: h3

      - type: grid-table
        properties:
          lookup:
            uuid: features
          columnHeaders: true
          rowHeaders: true
          cellDisplay:
            tests: boolean
            docs: boolean
            i18n: boolean
            a11y: boolean

      # ── Service Status Dashboard (color cells) ────────────────────
      - type: title
        properties:
          text: "Service Status — color cells"
          size: h3

      - type: grid-table
        properties:
          lookup:
            uuid: service-status
          columnHeaders: true
          rowHeaders: true
          cellDisplay:
            mon: color
            tue: color
            wed: color
            thu: color
            fri: color

      # ── KPI Summary (row headers, no column headers) ──────────────
      - type: title
        properties:
          text: "KPI Summary — row headers only"
          size: h3

      - type: grid-table
        properties:
          lookup:
            uuid: kpi
          columnHeaders: false
          rowHeaders: true

      # ── Scorecard (badge + number cells) ───────────────────────────
      - type: title
        properties:
          text: "Scorecard — badge + number cells"
          size: h3

      - type: grid-table
        properties:
          lookup:
            uuid: scorecard
          columnHeaders: true
          rowHeaders: true
          cellDisplay:
            current: number
            previous: number
            status: badge

      # ── Permission Matrix (boolean cross-matrix) ───────────────────
      - type: title
        properties:
          text: "Permission Matrix — boolean cross-matrix"
          size: h3

      - type: grid-table
        properties:
          lookup:
            uuid: permissions
          columnHeaders: true
          rowHeaders: true
          cellDisplay:
            read: boolean
            write: boolean
            approve: boolean
            admin: boolean

      # ── Comparison Table (text cross-matrix) ──────────────────────
      - type: title
        properties:
          text: "Comparison Table — text cross-matrix"
          size: h3

      - type: grid-table
        properties:
          lookup:
            uuid: comparison
          columnHeaders: false
          rowHeaders: true

      # ── Quarterly Revenue (number cells, cross-matrix) ─────────────
      - type: title
        properties:
          text: "Quarterly Revenue — number cells"
          size: h3

      - type: grid-table
        properties:
          lookup:
            uuid: quarterly
          columnHeaders: true
          rowHeaders: true
          cellDisplay:
            q1: number
            q2: number
            q3: number
            q4: number

      # ── Schedule Grid (plain text, all headers) ────────────────────
      - type: title
        properties:
          text: "Schedule Grid — plain text"
          size: h3

      - type: grid-table
        properties:
          lookup:
            uuid: schedule
          columnHeaders: true
          rowHeaders: true

      # ── Data-only Grid (no headers) ────────────────────────────────
      - type: title
        properties:
          text: "Data-only Grid — no headers"
          size: h3

      - type: grid-table
        properties:
          lookup:
            uuid: quarterly
          columnHeaders: false
          rowHeaders: false
          cellDisplay:
            q1: number
            q2: number
            q3: number
            q4: number

      # ── Compact Grids ──────────────────────────────────────────────
      - type: title
        properties:
          text: "Compact Grids — fixed width, tight padding"
          size: h3

      - type: markdown
        properties:
          content: |
            `compact: true` shrinks the table to fit its content — no
            stretching to fill the container. Tighter padding and
            `nowrap` on cells.

      - type: columns
        properties:
          distribution: [1, 1]
        columns:
          - components:
              - type: grid-table
                properties:
                  lookup:
                    uuid: kpi
                  columnHeaders: false
                  rowHeaders: true
                  compact: true
          - components:
              - type: grid-table
                properties:
                  lookup:
                    uuid: permissions
                  columnHeaders: true
                  rowHeaders: true
                  compact: true
                  cellDisplay:
                    read: boolean
                    write: boolean
                    approve: boolean
                    admin: boolean

      # ── Striped Rows ───────────────────────────────────────────────
      - type: title
        properties:
          text: "Striped Rows — alternating row backgrounds"
          size: h3

      - type: grid-table
        properties:
          lookup:
            uuid: schedule
          columnHeaders: true
          rowHeaders: true
          stripe: rows

      # ── Striped Columns ────────────────────────────────────────────
      - type: title
        properties:
          text: "Striped Columns — alternating column backgrounds"
          size: h3

      - type: grid-table
        properties:
          lookup:
            uuid: quarterly
          columnHeaders: true
          rowHeaders: true
          stripe: columns
          cellDisplay:
            q1: number
            q2: number
            q3: number
            q4: number

      # ── Full Grid — vertical lines + row stripes ───────────────────
      - type: title
        properties:
          text: "Full Grid — vertical lines + row stripes"
          size: h3

      - type: grid-table
        properties:
          lookup:
            uuid: permissions
          columnHeaders: true
          rowHeaders: true
          verticalLines: true
          stripe: rows
          cellDisplay:
            read: boolean
            write: boolean
            approve: boolean
            admin: boolean

      # ── Compact Full Grid ──────────────────────────────────────────
      - type: title
        properties:
          text: "Compact Full Grid — all options combined"
          size: h3

      - type: grid-table
        properties:
          lookup:
            uuid: features
          columnHeaders: true
          rowHeaders: true
          compact: true
          verticalLines: true
          stripe: both
          cellDisplay:
            tests: boolean
            docs: boolean
            i18n: boolean
            a11y: boolean
