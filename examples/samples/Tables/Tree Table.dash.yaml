pages:
  - name: Tree Table
    components:
      - type: title
        properties:
          text: Expandable Tree Table
          size: h2

      - type: markdown
        properties:
          content: >
            **expandable** creates hierarchical rows using `idColumn` and
            `parentColumn`. Rows whose `parentId` matches another row's `id`
            nest underneath it. `defaultExpanded` controls how many levels
            are open initially — set to a number for depth, or `true` for all.

      - type: tabs
        properties:
          targetPage: true
        tabs:
          Expand 2 Levels:
            components:
              - type: table
                properties:
                  lookup:
                    uuid: org
                  sortable: true
                  expandable:
                    idColumn: id
                    parentColumn: parentId
                    defaultExpanded: 2

          Fully Expanded:
            components:
              - type: table
                properties:
                  lookup:
                    uuid: org
                  sortable: true
                  expandable:
                    idColumn: id
                    parentColumn: parentId
                    defaultExpanded: true

          Collapsed:
            components:
              - type: markdown
                properties:
                  content: >
                    Start collapsed — click rows to expand manually.
              - type: table
                properties:
                  lookup:
                    uuid: org
                  sortable: true
                  expandable:
                    idColumn: id
                    parentColumn: parentId
                    defaultExpanded: false
