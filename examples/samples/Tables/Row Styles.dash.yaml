pages:
  - name: Row Styles
    components:
      - type: title
        properties:
          text: Conditional Row Styling
          size: h2

      - type: markdown
        properties:
          content: >
            **rowStyle** rules apply CSS styles conditionally per row.
            Each rule has a `condition` expression evaluated against row data.
            When true, either a `className` or inline `style` is applied.

      - type: data-table
        properties:
          lookup:
            uuid: tasks
          sortable: true
          pageSize: 15
          filter:
            notification: true
          rowStyle:
            - condition: "#{row.status} == 'Error'"
              style:
                backgroundColor: "#fce4ec"
                color: "#b71c1c"
            - condition: "#{row.priority} > 7"
              style:
                fontWeight: bold
            - condition: "#{row.status} == 'Pending'"
              style:
                backgroundColor: "#fff8e1"
            - condition: "#{row.status} == 'Complete'"
              style:
                color: "#1b5e20"

      - type: markdown
        properties:
          content: |
            **Rules applied** (first match wins):
            - `#{row.status} == 'Error'` → red background
            - `#{row.priority} > 7` → bold text
            - `#{row.status} == 'Pending'` → yellow background
            - `#{row.status} == 'Complete'` → green text
