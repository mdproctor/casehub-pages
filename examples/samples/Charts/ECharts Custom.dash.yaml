pages:
- components:
  - type: title
    properties:
      text: ECharts Custom Options
      size: h2
  - type: markdown
    properties:
      content: >
        **extraConfiguration** merges custom ECharts option JSON into the
        generated chart config — toolbox features, mark lines, visual styling,
        and any other ECharts option the built-in chart types don't expose directly.
  - type: bar-chart
    properties:
      title: Products
      chart:
        height: 400
        resizable: true
      lookup:
        uuid: products
        group:
        - columnGroup:
            source: product
          functions:
          - source: product
          - source: quantity
          - source: quantity2
      extraConfiguration: >-
        {
          "toolbox": {
            "feature": {
              "dataZoom": {},
              "magicType": { "type": ["line", "bar", "stack"] },
              "saveAsImage": {}
            }
          },
          "series": [
            { "type": "bar", "markLine": { "data": [{ "type": "max" }] } },
            { "type": "bar", "markLine": { "data": [{ "type": "max" }] } }
          ]
        }
datasets:
- uuid: products
  content: >-
    [
      ["Computers", "Scanner", 5, 3],
      ["Computers", "Printer", 7, 4],
      ["Computers", "Laptop", 3, 2],
      ["Electronics", "Camera", 10, 7],
      ["Electronics", "Headphones", 5, 9]
    ]
  columns:
  - id: Section
    type: LABEL
  - id: Product
    type: LABEL
  - id: Quantity
    type: NUMBER
  - id: Quantity2
    type: NUMBER
