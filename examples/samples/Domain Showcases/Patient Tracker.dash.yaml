pages:
- name: index
  components:
  - type: tabs
    properties:
      navGroupId: ClinicalNav
      width: 100%
- name: Ward Overview
  rows:
  - columns:
    - span: 3
      components:
      - type: title
        properties:
          text: Total Patients
          size: h3
      - type: metric
        properties:
          lookup:
            uuid: patients
            group:
            - functions:
              - source: id
                function: COUNT
          columns:
          - id: id
            pattern: '#'
    - span: 3
      components:
      - type: title
        properties:
          text: Critical Count
          size: h3
      - type: metric
        properties:
          lookup:
            uuid: patients
            filter:
            - column: status
              function: EQUALS_TO
              args:
              - Critical
            group:
            - functions:
              - source: id
                function: COUNT
          columns:
          - id: id
            pattern: '#'
    - span: 3
      components:
      - type: title
        properties:
          text: Avg Age
          size: h3
      - type: metric
        properties:
          lookup:
            uuid: patients
            group:
            - functions:
              - source: age
                function: AVERAGE
          columns:
          - id: age
            pattern: '#.#'
    - span: 3
      components:
      - type: title
        properties:
          text: Flagged
          size: h3
      - type: metric
        properties:
          lookup:
            uuid: patients
            filter:
            - column: flagged
              function: EQUALS_TO
              args:
              - 'true'
            group:
            - functions:
              - source: id
                function: COUNT
          columns:
          - id: id
            pattern: '#'
  - columns:
    - components:
      - type: selector
        properties:
          subtype: dropdown
          filter:
            selfApply: true
            notification: true
          lookup:
            uuid: patients
            group:
            - columnGroup:
                source: ward
              functions:
              - source: ward
  - columns:
    - span: 4
      components:
      - type: title
        properties:
          text: Patients by Diagnosis
          size: h3
      - type: pie-chart
        properties:
          filter:
            listening: true
          lookup:
            uuid: patients
            group:
            - columnGroup:
                source: diagnosis
              functions:
              - source: diagnosis
              - source: id
                function: COUNT
    - span: 4
      components:
      - type: title
        properties:
          text: Patients by Ward
          size: h3
      - type: bar-chart
        properties:
          filter:
            listening: true
          lookup:
            uuid: patients
            group:
            - columnGroup:
                source: ward
              functions:
              - source: ward
              - source: id
                function: COUNT
    - span: 4
      components:
      - type: title
        properties:
          text: Patients by Status
          size: h3
      - type: pie-chart
        properties:
          subtype: donut
          filter:
            listening: true
          lookup:
            uuid: patients
            group:
            - columnGroup:
                source: status
              functions:
              - source: status
              - source: id
                function: COUNT
  - columns:
    - span: 8
      components:
      - markdown: >-
          ## #{filter.ward ? filter.ward + " Ward" : "All Wards"} Overview

          **Current Status:** #{datasets.patients.rowCount} patients

          **ICU Protocols:** - Vitals monitoring every 2 hours - Critical patients require attending physician approval for transfers - Family visitation restricted to 15 minutes per hour

          **General Ward:** - Standard vitals monitoring every 4 hours - Discharge planning begins at admission - Medication reconciliation required within 24 hours

          **Pediatrics:** - Parent/guardian must remain with patient under 12 - Specialized dosing protocols for all medications - Play therapy available 9 AM - 5 PM

          **Maternity:** - Rooming-in encouraged for all mothers - Lactation consultant available on request - Newborn screening completed before discharge
    - span: 4
      components:
      - alert:
          severity: warning
          content: Review flagged patients requiring immediate attention
          dismissible: false
      - type: badge
        properties:
          lookup:
            uuid: patients
            group:
            - columnGroup:
                source: status
              functions:
              - source: status
  - columns:
    - span: 9
      components:
      - type: title
        properties:
          text: Admission Timelines
          size: h3
      - type: timeline
        properties:
          startColumn: admitDate
          endColumn: dischargeDate
          labelColumn: patient
          categoryColumn: ward
          chart:
            zoom: true
            height: 300
          lookup:
            uuid: admissions
    - span: 3
      components:
      - type: title
        properties:
          text: Next ICU Rounds
          size: h3
      - type: countdown
        properties:
          lookup:
            uuid: nextReview
- name: Vitals Monitor
  rows:
  - columns:
    - components:
      - type: title
        properties:
          text: Heart Rate by Patient
          size: h3
      - type: area-chart
        properties:
          filter:
            listening: true
          lookup:
            uuid: vitals
            group:
            - columnGroup:
                source: patientId
              functions:
              - source: patientId
              - source: heartRate
                function: AVERAGE
  - columns:
    - span: 6
      components:
      - type: title
        properties:
          text: Blood Pressure
          size: h3
      - type: line-chart
        properties:
          filter:
            listening: true
          lookup:
            uuid: vitals
            group:
            - columnGroup:
                source: timestamp
              functions:
              - source: timestamp
              - source: systolic
                function: AVERAGE
              - source: diastolic
                function: AVERAGE
    - span: 6
      components:
      - type: title
        properties:
          text: Oxygen Saturation
          size: h3
      - type: line-chart
        properties:
          filter:
            listening: true
          lookup:
            uuid: vitals
            group:
            - columnGroup:
                source: timestamp
              functions:
              - source: timestamp
              - source: o2Saturation
                function: AVERAGE
  - columns:
    - components:
      - type: data-table
        properties:
          pageSize: 10
          sortable: true
          lookup:
            uuid: vitals
          columns:
          - id: temperature
            expression: 'value > 38.5 ? "⚠️ " + value : value'
- name: Patient Detail
  dataScope:
    dataset: patients
    idColumn: id
  save:
    trigger: auto
    delay: 2000
    adapter: local
  components:
  - html: <div class='pf-v5-c-card pf-m-compact'><div class='pf-v5-c-card__title'>Patient Records</div><div class='pf-v5-c-card__body'>
  - type: data-table
    properties:
      sortable: true
      filter:
        listening: true
        notification: true
      lookup:
        uuid: patients
    visibleWhen: '#{filter.ward}'
  - html: </div></div>
  - action-button:
      label: Admit New Patient
      url: /api/patients
      method: POST
      style: primary
      confirm: Add a new patient to the system?
      body:
        name: New Patient
        status: Stable
      onSuccess:
        message: Patient admitted successfully
      onError:
        message: Failed to admit patient
  - html: <div class='pf-v5-c-card pf-m-compact'><div class='pf-v5-c-card__title'>Edit Patient</div><div class='pf-v5-c-card__body'>
  - text-input:
      field: name
      label: Patient Name
      readonly: true
  - number-input:
      field: age
      label: Age
      readonly: true
  - dropdown:
      field: ward
      label: Ward
      options:
        values:
        - ICU
        - General
        - Pediatrics
        - Maternity
        - Outpatient
  - dropdown:
      field: status
      label: Status
      options:
        values:
        - Stable
        - Monitoring
        - Critical
  - text-input:
      field: doctor
      label: Doctor
  - textarea:
      field: notes
      label: Notes
      rows: 4
  - date-picker:
      field: admitDate
      label: Admit Date
      readonly: true
  - checkbox:
      field: flagged
      label: Flagged for Review
  - html: </div></div>
- name: Assignments
  rows:
  - columns:
    - components:
      - type: title
        properties:
          text: Doctor-Patient Assignments
          size: h3
      - type: graph
        properties:
          chart:
            height: 500
          lookup:
            uuid: assignments
navTree:
  root_items:
  - type: GROUP
    id: ClinicalNav
    children:
    - page: Ward Overview
    - page: Vitals Monitor
    - page: Patient Detail
    - page: Assignments
