pages:
- name: index
  components:
  - type: sidebar
    properties:
      navGroupId: SalesNav
- name: Overview
  rows:
  - columns:
    - span: 3
      components:
      - type: metric
        properties:
          title: Total Revenue
          lookup:
            uuid: sales_transactions
            filter:
            - column: status
              function: EQUALS_TO
              args:
              - Won
            group:
            - functions:
              - source: amount
                function: SUM
          columns:
          - id: amount
            pattern: $#,###
    - span: 3
      components:
      - type: metric
        properties:
          title: Won Deals
          lookup:
            uuid: sales_transactions
            filter:
            - column: status
              function: EQUALS_TO
              args:
              - Won
            group:
            - functions:
              - source: amount
                function: COUNT
          columns:
          - id: amount
            pattern: '#'
    - span: 3
      components:
      - type: metric
        properties:
          title: Avg Deal Size
          lookup:
            uuid: sales_transactions
            group:
            - functions:
              - source: amount
                function: AVERAGE
          columns:
          - id: amount
            pattern: $#,###
    - span: 3
      components:
      - type: metric
        properties:
          title: Total Deals
          lookup:
            uuid: sales_transactions
            group:
            - functions:
              - source: amount
                function: COUNT
          columns:
          - id: amount
            pattern: '#'
  - columns:
    - span: 8
      components:
      - type: bar-chart
        properties:
          subtype: column-stacked
          title: Revenue by Region
          filter:
            listening: true
          lookup:
            uuid: sales_transactions
            filter:
            - column: status
              function: EQUALS_TO
              args:
              - Won
            group:
            - columnGroup:
                source: region
              functions:
              - source: region
              - source: amount
                function: SUM
    - span: 4
      components:
      - type: pie-chart
        properties:
          subtype: donut
          title: Revenue by Category
          filter:
            listening: true
          lookup:
            uuid: sales_transactions
            filter:
            - column: status
              function: EQUALS_TO
              args:
              - Won
            group:
            - columnGroup:
                source: category
              functions:
              - source: category
              - source: amount
                function: SUM
  - columns:
    - components:
      - type: selector
        properties:
          subtype: labels
          filter:
            selfApply: true
            notification: true
          lookup:
            uuid: sales_transactions
            group:
            - columnGroup:
                source: region
              functions:
              - source: region
  - columns:
    - span: 6
      components:
      - type: line-chart
        properties:
          title: Monthly Revenue
          filter:
            listening: true
          lookup:
            uuid: sales_transactions
            filter:
            - column: status
              function: EQUALS_TO
              args:
              - Won
            group:
            - columnGroup:
                source: date
                strategy: fixedCalendar
                unit: MONTH
              functions:
              - source: date
              - source: amount
                function: ${GoalsFunction}
    - span: 6
      components:
      - type: bar-chart
        properties:
          title: Top Reps
          filter:
            listening: true
          lookup:
            uuid: sales_transactions
            filter:
            - column: status
              function: EQUALS_TO
              args:
              - Won
            sort:
            - column: Revenue
              order: DESCENDING
            group:
            - columnGroup:
                source: rep
              functions:
              - source: rep
              - source: amount
                function: SUM
                column: Revenue
- name: Pipeline
  rows:
  - columns:
    - span: 4
      components:
      - type: metric
        properties:
          title: Pipeline Value
          lookup:
            uuid: pipeline
            group:
            - functions:
              - source: value
                function: SUM
          columns:
          - id: value
            pattern: $#,###
    - span: 4
      components:
      - type: metric
        properties:
          title: Avg Probability
          lookup:
            uuid: pipeline
            group:
            - functions:
              - source: probability
                function: AVERAGE
          columns:
          - id: probability
            pattern: '#'
    - span: 4
      components:
      - type: metric
        properties:
          title: Active Deals
          lookup:
            uuid: pipeline
            group:
            - functions:
              - source: value
                function: COUNT
          columns:
          - id: value
            pattern: '#'
  - columns:
    - components:
      - type: table
        properties:
          pageSize: 10
          sortable: true
          lookup:
            uuid: pipeline
  - columns:
    - span: 6
      components:
      - type: bar-chart
        properties:
          subtype: bar
          title: Pipeline by Stage
          chart:
            margin:
              left: 100
          lookup:
            uuid: pipeline
            group:
            - columnGroup:
                source: stage
              functions:
              - source: stage
              - source: value
                function: SUM
    - span: 6
      components:
      - type: pie-chart
        properties:
          subtype: donut
          title: Pipeline by Rep
          lookup:
            uuid: pipeline
            group:
            - columnGroup:
                source: rep
              functions:
              - source: rep
              - source: value
                function: SUM
- name: Trends
  rows:
  - columns:
    - components:
      - type: line-chart
        properties:
          subtype: smooth
          title: Revenue Trend
          chart:
            zoom: true
          lookup:
            uuid: sales_transactions
            filter:
            - column: status
              function: EQUALS_TO
              args:
              - Won
            group:
            - columnGroup:
                source: date
                strategy: fixedCalendar
                unit: MONTH
              functions:
              - source: date
              - source: amount
                function: SUM
  - columns:
    - span: 6
      components:
      - type: bar-chart
        properties:
          title: Quarterly Revenue
          lookup:
            uuid: sales_transactions
            filter:
            - column: status
              function: EQUALS_TO
              args:
              - Won
            group:
            - columnGroup:
                source: date
                strategy: fixedCalendar
                unit: QUARTER
              functions:
              - source: date
              - source: amount
                function: SUM
    - span: 6
      components:
      - type: bar-chart
        properties:
          subtype: column-stacked
          title: Category Trend
          lookup:
            uuid: sales_transactions
            filter:
            - column: status
              function: EQUALS_TO
              args:
              - Won
            group:
            - columnGroup:
                source: category
              functions:
              - source: category
              - source: amount
                function: SUM
- name: Deals
  components:
  - type: table
    properties:
      pageSize: 15
      sortable: true
      filter:
        enabled: true
        notification: true
      lookup:
        uuid: sales_transactions
      columns:
      - id: amount
        pattern: $#,###
navTree:
  root_items:
  - type: GROUP
    id: SalesNav
    children:
    - page: Overview
    - page: Pipeline
    - page: Trends
    - page: Deals
