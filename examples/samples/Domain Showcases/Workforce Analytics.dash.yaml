pages:
- rows:
  - columns:
    - components:
      - type: selector
        properties:
          subtype: labels
          filter:
            enabled: true
            notification: true
          lookup:
            uuid: employees
            group:
            - columnGroup:
                source: department
              functions:
              - source: department
  - columns:
    - span: 4
      components:
      - type: pie-chart
        properties:
          subtype: donut
          title: Headcount
          filter:
            listening: true
          lookup:
            uuid: employees
            group:
            - columnGroup:
                source: department
              functions:
              - source: department
              - source: department
                function: COUNT
                column: count
    - span: 4
      components:
      - type: bar-chart
        properties:
          subtype: column-stacked
          title: Level Distribution
          filter:
            listening: true
          lookup:
            uuid: employees
            group:
            - columnGroup:
                source: level
              functions:
              - source: level
              - source: level
                function: COUNT
                column: count
    - span: 4
      components:
      - type: bar-chart
        properties:
          subtype: bar
          title: Avg Salary by Level
          chart:
            margin:
              left: 80
          filter:
            listening: true
          lookup:
            uuid: employees
            sort:
            - column: Salary
              order: ASCENDING
            group:
            - columnGroup:
                source: level
              functions:
              - source: level
              - source: salary
                function: AVERAGE
                column: Salary
  - columns:
    - span: 8
      components:
      - type: scatter-chart
        properties:
          title: Tenure vs Salary
          filter:
            listening: true
          lookup:
            uuid: employees
            group:
            - columnGroup:
                source: name
              functions:
              - source: tenure
              - source: salary
    - span: 4
      components:
      - type: pie-chart
        properties:
          title: Rating Distribution
          filter:
            listening: true
          lookup:
            uuid: employees
            group:
            - columnGroup:
                source: rating
              functions:
              - source: rating
              - source: rating
                function: COUNT
                column: count
  - columns:
    - components:
      - type: table
        properties:
          pageSize: 15
          sortable: true
          filter:
            listening: true
          lookup:
            uuid: employees
          columns:
          - id: salary
            pattern: $#,###
