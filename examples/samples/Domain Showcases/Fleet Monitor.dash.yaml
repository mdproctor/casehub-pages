pages:
- name: index
  components:
  - type: sidebar
    properties:
      navGroupId: IoTNav
- name: Fleet Status
  rows:
  - columns:
    - span: 3
      components:
      - type: metric
        properties:
          title: Devices Online
          lookup:
            uuid: devices
            filter:
            - column: status
              function: NOT_IN
              args:
              - Offline
            group:
            - functions:
              - source: deviceId
                function: COUNT
          columns:
          - id: deviceId
            pattern: '#'
    - span: 3
      components:
      - type: metric
        properties:
          title: Avg Temperature
          lookup:
            uuid: sensor_readings
            group:
            - functions:
              - source: temperature
                function: AVERAGE
    - span: 3
      components:
      - type: metric
        properties:
          title: Avg Humidity
          lookup:
            uuid: sensor_readings
            group:
            - functions:
              - source: humidity
                function: AVERAGE
    - span: 3
      components:
      - type: metric
        properties:
          title: Low Battery
          lookup:
            uuid: sensor_readings
            filter:
            - column: battery
              function: LOWER_THAN
              args:
              - '20'
            group:
            - functions:
              - source: battery
                function: COUNT
          columns:
          - id: battery
            pattern: '#'
  - columns:
    - span: 8
      components:
      - type: table
        properties:
          title: Device Registry
          sortable: true
          filter:
            listening: true
          lookup:
            uuid: devices
    - span: 4
      components:
      - type: meter
        properties:
          title: Temperature
          filter:
            listening: true
          lookup:
            uuid: sensor_readings
            group:
            - functions:
              - source: temperature
                function: AVERAGE
          meter:
            end: 60
            warning: 30
            critical: 40
      - type: meter
        properties:
          title: Humidity
          filter:
            listening: true
          lookup:
            uuid: sensor_readings
            group:
            - functions:
              - source: humidity
                function: AVERAGE
          meter:
            end: 100
            warning: 70
            critical: 85
      - type: meter
        properties:
          title: Pressure (hPa)
          filter:
            listening: true
          lookup:
            uuid: sensor_readings
            group:
            - functions:
              - source: pressure
                function: AVERAGE
          meter:
            end: 1060
            warning: 1020
            critical: 1040
  - columns:
    - components:
      - type: selector
        properties:
          subtype: labels
          filter:
            notification: true
          lookup:
            uuid: sensor_readings
            group:
            - columnGroup:
                source: location
              functions:
              - source: location
- name: Sensor History
  rows:
  - columns:
    - components:
      - type: area-chart
        properties:
          subtype: area-stacked
          title: Temperature by Device
          chart:
            zoom: true
          lookup:
            uuid: sensor_readings
            group:
            - columnGroup:
                source: deviceId
              functions:
              - source: deviceId
              - source: temperature
                function: AVERAGE
  - columns:
    - span: 6
      components:
      - type: line-chart
        properties:
          subtype: smooth
          title: Humidity by Device
          lookup:
            uuid: sensor_readings
            group:
            - columnGroup:
                source: deviceId
              functions:
              - source: deviceId
              - source: humidity
                function: AVERAGE
    - span: 6
      components:
      - type: area-chart
        properties:
          title: Pressure by Device
          lookup:
            uuid: sensor_readings
            group:
            - columnGroup:
                source: deviceId
              functions:
              - source: deviceId
              - source: pressure
                function: AVERAGE
  - columns:
    - components:
      - type: timeseries
        properties:
          title: Battery Level
          lookup:
            uuid: sensor_readings
            group:
            - columnGroup:
                source: timestamp
              functions:
              - source: timestamp
              - source: battery
                function: AVERAGE
- name: Device Detail
  rows:
  - columns:
    - components:
      - type: table
        properties:
          title: Devices
          sortable: true
          filter:
            listening: true
            notification: true
          lookup:
            uuid: devices
  - columns:
    - span: 6
      components:
      - type: bar-chart
        properties:
          title: Readings by Device
          filter:
            listening: true
          lookup:
            uuid: sensor_readings
            group:
            - columnGroup:
                source: deviceId
              functions:
              - source: deviceId
              - source: temperature
                function: AVERAGE
              - source: humidity
                function: AVERAGE
    - span: 6
      components:
      - type: pie-chart
        properties:
          subtype: donut
          title: Devices by Type
          filter:
            listening: true
          lookup:
            uuid: devices
            group:
            - columnGroup:
                source: type
              functions:
              - source: type
              - source: type
                function: COUNT
  - columns:
    - components:
      - type: table
        properties:
          title: Sensor Readings
          pageSize: 10
          sortable: true
          filter:
            listening: true
          lookup:
            uuid: sensor_readings
          columns:
          - id: battery
            pattern: '##%'
navTree:
  root_items:
  - type: GROUP
    id: IoTNav
    children:
    - page: Fleet Status
    - page: Sensor History
    - page: Device Detail
