datasets:
- uuid: github_repos
  cacheEnabled: 'true'
  refreshTime: 10minute
  expression: '$.items.[name, stargazers_count, forks, watchers_count, open_issues, owner.login, created_at, language ? language
    : ''-'', description ]'
  url: https://api.github.com/search/repositories?q=stars:>1&s=stars
  columns:
  - id: name
    type: label
  - id: stars
    type: number
  - id: forks
    type: number
  - id: watchers
    type: number
  - id: open_issues
    type: number
  - id: owner_login
    type: label
  - id: created
    type: label
  - id: language
    type: label
  - id: description
    type: text
pages:
- components:
  - title: Top 10 GitHub Repositories by Stars
  - type: bar-chart
    properties:
      lookup:
        rowCount: 10
        group:
        - columnGroup:
            source: name
          functions:
          - source: name
          - source: stars
        uuid: github_repos
      axis:
        x:
          labels_angle: -10
  - title: List of top repositories by stars
  - type: table
    properties:
      lookup:
        uuid: github_repos
      sortable: true
