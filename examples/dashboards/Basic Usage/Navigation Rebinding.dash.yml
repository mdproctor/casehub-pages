global:
  displayer:
    chart:
      resizable: true
      height: 300

pages:
  # === TOP LEVEL: choose nav variant ===
  - name: index
    components:
      - html: >-
          <div style="padding: 12px 20px; background: linear-gradient(135deg, #1a1a2e, #16213e); color: #e0e0e0; margin-bottom: 16px; border-radius: 8px">
            <strong style="font-size: 1.3em">Navigation Rebinding</strong>
            <span style="margin-left: 12px; opacity: 0.7">Same three-level content hierarchy, different navigation wrappers — switch pills to compare</span>
          </div>
      - type: PILLS
        properties:
          width: 100%
          navGroupId: Variants

  # =============================================
  # VARIANT 1: Tree View (self-contained)
  # =============================================
  - name: "Tree View"
    components:
      - type: TREE
        properties:
          navGroupId: MainNav

  # =============================================
  # VARIANT 2: Tabs View
  # =============================================
  - name: "Tabs View"
    components:
      - type: TABS
        properties:
          width: 100%
          navGroupId: MainNav

  # =============================================
  # VARIANT 3: Menu View
  # =============================================
  - name: "Menu View"
    components:
      - type: MENU
        properties:
          width: 100%
          navGroupId: MainNav

  # =============================================
  # VARIANT 4: Sidebar View (self-contained)
  # =============================================
  - name: "Sidebar View"
    components:
      - type: SIDEBAR
        properties:
          navGroupId: MainNav

  # =============================================
  # VARIANT 5: Tiles View
  # =============================================
  - name: "Tiles View"
    components:
      - type: TILES
        properties:
          navGroupId: MainNav

  # =============================================
  # VARIANT 6: Carousel View
  # =============================================
  - name: "Carousel View"
    components:
      - type: CAROUSEL
        properties:
          navGroupId: MainNav

  # =============================================
  # SHARED CONTENT PAGES (three-level hierarchy)
  # =============================================

  # Level 1: Dashboard (inline content)
  - name: Dashboard
    rows:
      - columns:
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Total Revenue
                  columns:
                    - id: Revenue
                      pattern: "$#,##0"
                  lookup:
                    uuid: sales
                    group:
                      - functions:
                          - source: Revenue
                            function: SUM
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Products
                  columns:
                    - id: Product
                      pattern: "#"
                  lookup:
                    uuid: sales
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                            function: COUNT
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Regions
                  columns:
                    - id: Region
                      pattern: "#"
                  lookup:
                    uuid: sales
                    group:
                      - columnGroup:
                          source: Region
                        functions:
                          - source: Region
                            function: COUNT
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Avg Deal
                  columns:
                    - id: Revenue
                      pattern: "$#,##0"
                  lookup:
                    uuid: sales
                    group:
                      - functions:
                          - source: Revenue
                            function: AVERAGE
      - columns:
          - span: 6
            components:
              - displayer:
                  type: BARCHART
                  general:
                    title: Revenue by Product
                  lookup:
                    uuid: sales
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Revenue
                            function: SUM
          - span: 6
            components:
              - displayer:
                  type: LINECHART
                  subtype: SMOOTH
                  general:
                    title: Monthly Trend
                  chart:
                    height: 250
                  lookup:
                    uuid: monthly
                    group:
                      - columnGroup:
                          source: Month
                        functions:
                          - source: Month
                          - source: Revenue
                          - source: Target

  # Level 1: Settings (container with nested nav)
  - name: Settings
    components:
      - type: TABS
        properties:
          navGroupId: SettingsPages

  # Level 2: Profile (external file include)
  - name: Profile
    components:
      - page: Profile Detail
        src: includes/settings-profile.dash.yml

  # Level 2: Security (inline content)
  - name: Security
    components:
      - displayer:
          table:
            pageSize: 5
            sortable: true
          general:
            title: Security Audit Log
          lookup:
            uuid: security-log

  # Level 1: Reports (external file include)
  - name: Reports
    components:
      - page: Reports Detail
        src: includes/reports.dash.yml

  # Level 1: Sales (container with nested content and visualizations)
  - name: Sales
    components:
      - type: TABS
        properties:
          navGroupId: SalesPages

  # Level 2: Revenue
  - name: Revenue
    rows:
      - columns:
          - span: 6
            components:
              - displayer:
                  type: BARCHART
                  general:
                    title: Revenue by Product
                  lookup:
                    uuid: sales
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Revenue
                            function: SUM
          - span: 6
            components:
              - displayer:
                  type: PIECHART
                  subtype: DONUT
                  general:
                    title: Revenue Share
                  lookup:
                    uuid: sales
                    group:
                      - columnGroup:
                          source: Region
                        functions:
                          - source: Region
                          - source: Revenue
                            function: SUM

  # Level 2: Transactions (rebinds between Table and Form — three levels deep)
  - name: Transactions
    components:
      - type: PILLS
        properties:
          navGroupId: TransactionViews

  # Level 3: Table view
  - name: Txn Table
    components:
      - displayer:
          table:
            pageSize: 8
            sortable: true
            filter:
              enabled: true
              notification: true
          general:
            title: Recent Transactions
          lookup:
            uuid: sales

  # Level 3: Form view (same data, different presentation)
  - name: Txn Form
    dataScope:
      dataset: sales
      idColumn: id
    save:
      trigger: auto
      delay: 500
      adapter: local
    components:
      - html: >-
          <div style="display:flex;gap:8px;padding:0 0 12px">
            <button onclick="this.dispatchEvent(new CustomEvent('casehub-record-navigate',{bubbles:true,composed:true,detail:{direction:'prev'}}))"
              style="padding:6px 16px;border:1px solid #d0d5dd;border-radius:6px;background:#fff;cursor:pointer;font-size:13px">← Previous</button>
            <button onclick="this.dispatchEvent(new CustomEvent('casehub-record-navigate',{bubbles:true,composed:true,detail:{direction:'next'}}))"
              style="padding:6px 16px;border:1px solid #d0d5dd;border-radius:6px;background:#fff;cursor:pointer;font-size:13px">Next →</button>
          </div>
      - text-input:
          field: Product
          label: Product
      - text-input:
          field: Region
          label: Region
      - number-input:
          field: Revenue
          label: Revenue

  # Level 2: Pipeline
  - name: Pipeline
    rows:
      - columns:
          - span: 4
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Total Revenue
                  columns:
                    - id: Revenue
                      pattern: "$#,##0"
                  lookup:
                    uuid: sales
                    group:
                      - functions:
                          - source: Revenue
                            function: SUM
          - span: 4
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Avg Deal Size
                  columns:
                    - id: Revenue
                      pattern: "$#,##0"
                  lookup:
                    uuid: sales
                    group:
                      - functions:
                          - source: Revenue
                            function: AVERAGE
          - span: 4
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Total Deals
                  columns:
                    - id: Revenue
                      pattern: "#"
                  lookup:
                    uuid: sales
                    group:
                      - functions:
                          - source: Revenue
                            function: COUNT
      - properties:
            margin-top: 20px
        columns:
          - components:
              - displayer:
                  type: LINECHART
                  subtype: SMOOTH
                  general:
                    title: Revenue Trend
                  chart:
                    height: 250
                  lookup:
                    uuid: monthly
                    group:
                      - columnGroup:
                          source: Month
                        functions:
                          - source: Month
                          - source: Revenue
                          - source: Target

  # Level 1: Operations (container with nested content)
  - name: Operations
    components:
      - type: TABS
        properties:
          navGroupId: OpsPages

  # Level 2: Monitoring
  - name: Monitoring
    rows:
      - columns:
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: CPU
                  lookup:
                    uuid: ops
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - CPU
                    group:
                      - functions:
                          - source: Value
                            function: MAX
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Memory
                  lookup:
                    uuid: ops
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - Memory
                    group:
                      - functions:
                          - source: Value
                            function: MAX
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Disk
                  lookup:
                    uuid: ops
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - Disk
                    group:
                      - functions:
                          - source: Value
                            function: MAX
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Network
                  lookup:
                    uuid: ops
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - Network
                    group:
                      - functions:
                          - source: Value
                            function: MAX

  # Level 2: Services
  - name: Services
    rows:
      - columns:
          - span: 6
            components:
              - displayer:
                  type: BARCHART
                  general:
                    title: Request Latency (ms)
                  chart:
                    margin:
                      left: 100
                  lookup:
                    uuid: services
                    sort:
                      - column: Latency
                        sortOrder: DESCENDING
                    group:
                      - columnGroup:
                          source: Service
                        functions:
                          - source: Service
                          - source: Latency
                            function: AVERAGE
          - span: 6
            components:
              - displayer:
                  type: BARCHART
                  general:
                    title: Error Rate (%)
                  lookup:
                    uuid: services
                    sort:
                      - column: ErrorRate
                        sortOrder: DESCENDING
                    group:
                      - columnGroup:
                          source: Service
                        functions:
                          - source: Service
                          - source: ErrorRate
                            function: AVERAGE

navTree:
  root_items:
    # Top-level variant selector
    - type: GROUP
      id: Variants
      children:
        - page: "Tree View"
        - page: "Tabs View"
        - page: "Menu View"
        - page: "Sidebar View"
        - page: "Tiles View"
        - page: "Carousel View"

    # Main navigation (three-level hierarchy)
    - type: GROUP
      id: MainNav
      children:
        - page: Dashboard
        - type: GROUP
          id: Settings
          children:
            - page: Profile
            - page: Security
        - page: Reports
        - type: GROUP
          id: Sales
          children:
            - page: Revenue
            - page: Transactions
            - page: Pipeline
        - type: GROUP
          id: Operations
          children:
            - page: Monitoring
            - page: Services

    # Settings nested nav
    - type: GROUP
      id: SettingsPages
      children:
        - page: Profile
        - page: Security

    # Sales nested nav
    - type: GROUP
      id: SalesPages
      children:
        - page: Revenue
        - page: Transactions
        - page: Pipeline

    # Transactions view rebinding (level 3)
    - type: GROUP
      id: TransactionViews
      children:
        - page: "Txn Table"
        - page: "Txn Form"

    # Operations nested nav
    - type: GROUP
      id: OpsPages
      children:
        - page: Monitoring
        - page: Services

