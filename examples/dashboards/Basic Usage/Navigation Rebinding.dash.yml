global:
  displayer:
    chart:
      resizable: true
      height: 300

pages:
  # === TOP LEVEL: choose layout variant ===
  - name: index
    components:
      - html: >-
          <div style="padding: 12px 20px; background: linear-gradient(135deg, #1a1a2e, #16213e); color: #e0e0e0; margin-bottom: 16px; border-radius: 8px">
            <strong style="font-size: 1.3em">Navigation Rebinding</strong>
            <span style="margin-left: 12px; opacity: 0.7">Same content pages, different navigation wrappers — switch tabs to compare</span>
          </div>
      - type: TABS
        properties:
          width: 100%
          navGroupId: LayoutVariants
          targetDivId: layout_target
      - div: layout_target

  # =============================================
  # VARIANT 1: Tree (outer) → Tabs (inner)
  # =============================================
  - name: "Tree + Tabs"
    rows:
      - columns:
          - span: 3
            components:
              - type: TREE
                properties:
                  width: 200px
                  navGroupId: TreeSections
                  targetDivId: tree_content
          - span: 9
            components:
              - div: tree_content

  - name: "T-Sales"
    components:
      - type: TABS
        properties:
          width: 100%
          navGroupId: SalesPages
          targetDivId: t_sales_inner
      - div: t_sales_inner

  - name: "T-Ops"
    components:
      - type: TABS
        properties:
          width: 100%
          navGroupId: OpsPages
          targetDivId: t_ops_inner
      - div: t_ops_inner

  # =============================================
  # VARIANT 2: Menu (outer) → Pills (inner)
  # =============================================
  - name: "Menu + Pills"
    components:
      - type: MENU
        properties:
          width: 100%
          navGroupId: MenuSections
          targetDivId: menu_content
      - div: menu_content

  - name: "M-Sales"
    components:
      - type: PILLS
        properties:
          width: 100%
          navGroupId: SalesPages
          targetDivId: m_sales_inner
      - div: m_sales_inner

  - name: "M-Ops"
    components:
      - type: PILLS
        properties:
          width: 100%
          navGroupId: OpsPages
          targetDivId: m_ops_inner
      - div: m_ops_inner

  # =============================================
  # VARIANT 3: Tiles (outer) → Carousel (inner)
  # =============================================
  - name: "Tiles + Carousel"
    components:
      - type: TILES
        properties:
          navGroupId: TilesSections

  - name: "C-Sales"
    components:
      - type: CAROUSEL
        properties:
          navGroupId: SalesPages

  - name: "C-Ops"
    components:
      - type: CAROUSEL
        properties:
          navGroupId: OpsPages

  # =============================================
  # SHARED CONTENT PAGES
  # =============================================

  - name: Revenue
    rows:
      - columns:
          - span: 6
            components:
              - displayer:
                  type: BARCHART
                  general:
                    title: Revenue by Product
                  lookup:
                    uuid: sales
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Revenue
                            function: SUM
          - span: 6
            components:
              - displayer:
                  type: PIECHART
                  subtype: DONUT
                  general:
                    title: Revenue Share
                  lookup:
                    uuid: sales
                    group:
                      - columnGroup:
                          source: Region
                        functions:
                          - source: Region
                          - source: Revenue
                            function: SUM

  - name: Transactions
    components:
      - displayer:
          table:
            pageSize: 8
            sortable: true
          general:
            title: Recent Transactions
          lookup:
            uuid: sales

  - name: Pipeline
    rows:
      - columns:
          - span: 4
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Total Revenue
                  columns:
                    - id: Revenue
                      pattern: "$#,##0"
                  lookup:
                    uuid: sales
                    group:
                      - functions:
                          - source: Revenue
                            function: SUM
          - span: 4
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Avg Deal Size
                  columns:
                    - id: Revenue
                      pattern: "$#,##0"
                  lookup:
                    uuid: sales
                    group:
                      - functions:
                          - source: Revenue
                            function: AVERAGE
          - span: 4
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Total Deals
                  columns:
                    - id: Revenue
                      pattern: "#"
                  lookup:
                    uuid: sales
                    group:
                      - functions:
                          - source: Revenue
                            function: COUNT
      - properties:
            margin-top: 20px
        columns:
          - components:
              - displayer:
                  type: LINECHART
                  subtype: SMOOTH
                  general:
                    title: Revenue Trend
                  chart:
                    height: 250
                  lookup:
                    uuid: monthly
                    group:
                      - columnGroup:
                          source: Month
                        functions:
                          - source: Month
                          - source: Revenue
                          - source: Target

  - name: Monitoring
    rows:
      - columns:
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: CPU
                  lookup:
                    uuid: ops
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - CPU
                    group:
                      - functions:
                          - source: Value
                            function: MAX
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Memory
                  lookup:
                    uuid: ops
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - Memory
                    group:
                      - functions:
                          - source: Value
                            function: MAX
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Disk
                  lookup:
                    uuid: ops
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - Disk
                    group:
                      - functions:
                          - source: Value
                            function: MAX
          - span: 3
            components:
              - displayer:
                  type: METRIC
                  general:
                    title: Network
                  lookup:
                    uuid: ops
                    filter:
                      - column: Metric
                        function: EQUALS_TO
                        args:
                          - Network
                    group:
                      - functions:
                          - source: Value
                            function: MAX

  - name: Services
    rows:
      - columns:
          - span: 6
            components:
              - displayer:
                  type: BARCHART
                  general:
                    title: Request Latency (ms)
                  chart:
                    margin:
                      left: 100
                  lookup:
                    uuid: services
                    sort:
                      - column: Latency
                        sortOrder: DESCENDING
                    group:
                      - columnGroup:
                          source: Service
                        functions:
                          - source: Service
                          - source: Latency
                            function: AVERAGE
          - span: 6
            components:
              - displayer:
                  type: BARCHART
                  general:
                    title: Error Rate (%)
                  lookup:
                    uuid: services
                    sort:
                      - column: ErrorRate
                        sortOrder: DESCENDING
                    group:
                      - columnGroup:
                          source: Service
                        functions:
                          - source: Service
                          - source: ErrorRate
                            function: AVERAGE

navTree:
  root_items:
    - type: GROUP
      id: LayoutVariants
      children:
        - page: "Tree + Tabs"
        - page: "Menu + Pills"
        - page: "Tiles + Carousel"

    - type: GROUP
      id: TreeSections
      children:
        - page: "T-Sales"
        - page: "T-Ops"
    - type: GROUP
      id: MenuSections
      children:
        - page: "M-Sales"
        - page: "M-Ops"
    - type: GROUP
      id: TilesSections
      children:
        - page: "C-Sales"
        - page: "C-Ops"

    - type: GROUP
      id: SalesPages
      children:
        - page: Revenue
        - page: Transactions
        - page: Pipeline
    - type: GROUP
      id: OpsPages
      children:
        - page: Monitoring
        - page: Services

