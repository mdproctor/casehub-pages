global:
  displayer:
    chart:
      resizable: true
pages:
  - name: index
    properties:
      margin: 10px
    components:
      - type: TABS
        properties:
          width: 100%
          navGroupId: MainGroup
          targetDivId: all_div
      - div: all_div
  - name: Forms
    dataScope:
      dataset: products
      idColumn: Product
    components:
      - html: >-
          <p>Forms use native input components bound to page data via <i>dataScope</i>. 
          See the <strong>Contact Manager</strong> example for a complete master-detail demo.</p>
      - text-input:
          field: Product
          label: Product
          readonly: true
      - number-input:
          field: Quantity
          label: Quantity
          readonly: true
      - dropdown:
          field: Section
          label: Section
          readonly: true
          options:
            values: [Computers, Electronics]
  - name: SVG Heatmap
    components:
      - displayer:
          component: svg-heatmap
          external:
            width: 100%
          svg-heatmap:
            svg: >-
              <svg xmlns="http://www.w3.org/2000/svg">
                <path id="svg_1" d="m23,23l82,0l0,51l-82,0l0,-51z" stroke-width="0" fill="#999999"/>
                <path id="svg_2" d="m133,23l82,0l0,51l-82,0l0,-51z" stroke-width="0" fill="#999999"/>
                <path id="svg_3" d="m240,23l82,0l0,51l-82,0l0,-51z" stroke-width="0" fill="#999999"/>
                <path id="svg_4" d="m350,23l82,0l0,51l-82,0l0,-51z" stroke-width="0" fill="#999999"/>
                <path id="svg_5" d="m461,24l82,0l0,51l-82,0l0,-51z" stroke-width="0" fill="#999999"/>
                <path id="svg_6" d="m566,26l82,0l0,51l-82,0l0,-51z" stroke-width="0" fill="#999999"/>
              </svg>
          lookup:
            uuid: svg-data
  - name: ECharts
    components:
      - displayer:
          component: echarts
          external:
            width: 100%
            height: 400px
          echarts:
            title:
              text: Products
              left: center
            option: >-
              {
                "toolbox": {
                    "feature": {
                        "dataZoom": {},
                        "magicType": {
                            "type": ["line", "bar", "stack"]
                        },
                        "saveAsImage": {}
                    }   
                },
                "series": [
                        { 
                            "type": "bar",
                            "markLine": {
                                "data": [
                                    { "type": "max" }
                                ]
                            } 
                        
                        },
                        { 
                            "type": "bar",
                            "markLine": {
                                "data": [
                                    { "type": "max" }
                                ]
                            } 
                        
                        }
                ]
                }
          lookup:
            uuid: products
            group:
              - columnGroup:
                  source: product
                functions:
                  - source: product
                  - source: quantity
                  - source: quantity2
  - name: Meter
    properties:
      font-size: x-large
      text-align: center
    components:
      - properties:
          float: left
        displayer:
          type: METERCHART
          general:
            title: "Memory Usage"
          chart:
            resizable: false
            legend:
              show: "true"
              position: bottom
          meter:
            end: "4120"
            critical: "3000"
            warning: "2000"
          lookup:
            uuid: memory_usage
            group:
              - columnGroup:
                  source: Server
                functions:
                  - source: Server
                  - source: Usage
                    function: SUM
  - name: Selectors
    components:
      - html: >-
          <p>Melviz Displayers can filter each other. For filtering only we have selectors components. You can enable
          filter using the filter section, the component that filter others:<br /> <pre> filter:
              notification: true</pre>
          </p><p>
            Then on the component that will be filtered:<pre>
          filter:
              listening: true</pre>
          </p>

      - html: >-
          <strong> Default Selector </strong>
      - displayer:
          type: SELECTOR
          filter:
            enabled: true
            notification: true
            listening: false
            selfapply: false
          lookup:
            uuid: products
            group:
              - columnGroup:
                  source: Section
                functions:
                  - source: Section
      - html: >-
          <br /><strong>subtype SELECTOR_LABELS (used only with LABEL column types)</strong>
      - displayer:
          type: SELECTOR
          subtype: SELECTOR_LABELS
          filter:
            notification: true
          lookup:
            uuid: products
            group:
              - columnGroup:
                  source: Section
                functions:
                  - source: Section
      - displayer:
          type: BARCHART
          filter:
            listening: true
          lookup:
            uuid: products
            group:
              - columnGroup:
                  source: Product
                functions:
                  - source: Product
                  - source: Quantity
                  - source: Quantity2
  - name: Metric
    components:
      - html: >-
          Metric components render an HTML template based on data. Users can customize the HTML and Javascript based on
          data.
      - html: "<h4><strong>Default Metric</strong></h4><br />"
      - displayer:
          type: METRIC
          chart:
            height: 100
            width: 150
          general:
            visible: true
            title: Total Products
          lookup:
            uuid: products
            group:
              - functions:
                  - source: Quantity
                    function: SUM
      - html: "The following metric uses custom HTML and Javascript template:"
        properties:
          margin-top: 20px
          margin-bottom: 20px
      - properties:
          border: solid 1px
        displayer:
          type: METRIC
          html:
            html: >-
              <h2><strong>&#10026; Total Products:</strong>&nbsp;<span id="${this}">${value}</span></h2>
            javascript: >-
              ${this}.onmouseover = function() {
                    ${this}.style.color = "red";
                };
                ${this}.onmouseout = function() {
                    ${this}.style.color = "black";
                };
          general:
            visible: true
            title: Total Products
          lookup:
            uuid: products
            group:
              - functions:
                  - source: Quantity
                    function: SUM
  - name: Map
    rows:
      - columns:
          - span: 6
            components:
              - html: "<h4><strong>subtype MAP_REGIONS (default)</strong></h4><br />"
              - displayer:
                  type: MAP
                  lookup:
                    uuid: countries
                    group:
                      - columnGroup:
                          source: Country
                        functions:
                          - source: Country
                          - source: Value
          - span: 6
            components:
              - html: "<h4><strong>subtype MAP_MARKERS</strong></h4><br />"
              - displayer:
                  type: MAP
                  subtype: MAP_MARKERS
                  lookup:
                    uuid: countries
                    group:
                      - columnGroup:
                          source: Country
                        functions:
                          - source: Country
                          - source: Value
  - name: Pie Chart
    rows:
      - columns:
          - span: 6
            components:
              - displayer:
                  type: PIECHART
                  general:
                    title: subtype pie (default)
                  lookup:
                    uuid: products
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Quantity
          - span: 6
            components:
              - displayer:
                  type: PIECHART
                  subtype: DONUT
                  general:
                    title: subtype donut
                  lookup:
                    uuid: products
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Quantity
  - name: Bubble Chart
    rows:
      - columns:
          - span: 6
            components:
              - html: "<h4><strong>Bubble Chart</strong></h4><br />"
              - displayer:
                  type: BUBBLECHART
                  lookup:
                    uuid: products
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Quantity
                          - source: Quantity2
                          - source: Product
  - name: Area Chart
    rows:
      - columns:
          - span: 6
            components:
              - displayer:
                  type: AREACHART
                  general:
                    title: subtype area (default)
                  lookup:
                    uuid: products
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Quantity
                          - source: Quantity2
          - span: 6
            components:
              - displayer:
                  type: AREACHART
                  subtype: AREA_STACKED
                  general:
                    title: subtype AREA_STACKED
                  lookup:
                    uuid: products
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Quantity
                          - source: Quantity2
  - name: Timeseries
    components:
      - displayer:
          type: TIMESERIES
          general:
            title: Sample Timeseries
          chart:
            zoom: true
          external:
            width: 100%
          lookup:
            uuid: timeseries
  - name: Table
    components:
      - html: "<h4><strong>Table (default type)</strong></h4>"
      - displayer:
          table:
            pageSize: 10
          chart:
            resizable: true
          lookup:
            uuid: products

  - name: Bar Chart
    rows:
      - columns:
          - span: 6
            components:
              - displayer:
                  type: BARCHART
                  general:
                    title: subtype COLUMN (default)
                  lookup:
                    uuid: products
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Quantity
                          - source: Quantity2
          - span: 6
            components:
              - displayer:
                  type: BARCHART
                  subtype: BAR
                  general:
                    title: subtype BAR
                  chart:
                    margin:
                      left: 80
                  lookup:
                    uuid: products
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Quantity
                          - source: Quantity2
      - columns:
          - span: 6
            components:
              - displayer:
                  type: BARCHART
                  subtype: COLUMN_STACKED
                  general:
                    title: Column Stacked
                  lookup:
                    uuid: products
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Quantity
                          - source: Quantity2
          - span: 6
            components:
              - displayer:
                  type: BARCHART
                  subtype: BAR_STACKED
                  general:
                    title: subtype BAR
                  chart:
                    margin:
                      left: 80
                  lookup:
                    uuid: products
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Quantity
                          - source: Quantity2
  - name: Line Chart
    rows:
      - columns:
          - span: 6
            components:
              - displayer:
                  type: LINECHART
                  general:
                    title: subtype line (default)
                  lookup:
                    uuid: products
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Quantity
                          - source: Quantity2
          - span: 6
            components:
              - displayer:
                  type: LINECHART
                  subtype: SMOOTH
                  general:
                    title: subtype smooth
                  lookup:
                    uuid: products
                    group:
                      - columnGroup:
                          source: Product
                        functions:
                          - source: Product
                          - source: Quantity
                          - source: Quantity2

navTree:
  root_items:
    - type: GROUP
      id: MainGroup
      children:
        - page: Bar Chart
        - page: Line Chart
        - page: Area Chart
        - page: Pie Chart
        - page: Bubble Chart
        - page: Timeseries
        - page: Table
        - page: Metric
        - page: Meter
        - page: Selectors
        - page: ECharts
        - page: SVG Heatmap
        - page: Forms

